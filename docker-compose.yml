services:
  grimoire:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grimoire
    ports:
      - "127.0.0.1:3210:3210"
    volumes:
      - grimoire-data:/data
    environment:
      - HOST=0.0.0.0
      - PORT=3210
      - DATA_DIR=/data
      - XDG_CONFIG_HOME=/data/config
      - HOME=/data
      - NODE_ENV=production
      - LOG_FORMAT=json
      - LITTLEIMP_IN_CONTAINER=1
      # Optional: seed OpenAI defaults for first start or unattended deployments.
      # Runtime settings saved through the UI/API remain the source of truth.
      # - LLM_API_KEY=your-api-key
      # - LLM_MODEL=gpt-4o-mini
      # - EMBEDDING_API_KEY=your-api-key
      # - EMBEDDING_MODEL=text-embedding-3-small
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Ollama service for local AI
  # Uncomment if you want to use local AI processing
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "127.0.0.1:11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

volumes:
  grimoire-data:
    driver: local
  # ollama-data:
  #   driver: local

networks:
  default:
    driver: bridge
