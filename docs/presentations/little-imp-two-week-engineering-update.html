<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Little Imp - Two-Week Engineering Update</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7f2;
        --bg-2: #e8efe8;
        --surface: #ffffff;
        --surface-strong: #fdfaf2;
        --ink: #16201c;
        --muted: #59685f;
        --line: #cfd9d0;
        --line-strong: #a7b7aa;
        --teal: #087f8c;
        --blue: #3157c9;
        --green: #287b58;
        --amber: #aa6b00;
        --coral: #c24632;
        --violet: #6c4dc4;
        --shadow: 0 20px 55px rgba(37, 48, 43, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(120deg, rgba(8, 127, 140, 0.09), transparent 34%),
          linear-gradient(250deg, rgba(194, 70, 50, 0.08), transparent 30%),
          var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .deck-nav {
        position: fixed;
        inset: 14px 14px auto;
        z-index: 20;
        display: grid;
        grid-template-columns: auto auto minmax(180px, 360px) auto auto;
        gap: 8px;
        align-items: center;
        width: min(calc(100vw - 28px), 980px);
        padding: 10px;
        border: 1px solid rgba(167, 183, 170, 0.85);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 12px 35px rgba(37, 48, 43, 0.12);
        backdrop-filter: blur(14px);
      }

      .deck-nav button,
      .deck-nav select,
      .filter-row button,
      .note-toggle {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--ink);
        padding: 0 12px;
      }

      .deck-nav button:hover,
      .filter-row button:hover,
      .note-toggle:hover {
        border-color: var(--teal);
      }

      .deck-nav button:focus-visible,
      .deck-nav select:focus-visible,
      .filter-row button:focus-visible,
      summary:focus-visible,
      .slide:focus-visible {
        outline: 3px solid rgba(8, 127, 140, 0.32);
        outline-offset: 2px;
      }

      .deck-nav select {
        width: 100%;
      }

      .progress-track {
        grid-column: 1 / -1;
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--bg-2);
      }

      .progress-fill {
        display: block;
        width: var(--progress, 8%);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--teal), var(--green), var(--amber));
        transition: width 160ms ease;
      }

      .counter {
        color: var(--muted);
        font-size: 0.88rem;
        white-space: nowrap;
      }

      main {
        min-height: 100vh;
      }

      .slide {
        display: none;
        min-height: 100vh;
        padding: 112px clamp(22px, 5vw, 78px) 72px;
      }

      .slide.is-active {
        display: grid;
        align-content: center;
        gap: 24px;
      }

      .slide.is-dimmed {
        opacity: 1;
      }

      .eyebrow {
        margin: 0;
        color: var(--teal);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      h4,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 1120px;
        margin-bottom: 0;
        font-size: clamp(2.4rem, 7vw, 6.5rem);
        line-height: 0.94;
        letter-spacing: 0;
      }

      h2 {
        font-size: clamp(1.6rem, 3vw, 2.6rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      h3 {
        font-size: 1.05rem;
        line-height: 1.25;
        letter-spacing: 0;
      }

      h4 {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.82rem;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      p,
      li {
        line-height: 1.5;
      }

      ul,
      ol {
        margin-top: 0;
      }

      code {
        border: 1px solid var(--line);
        border-radius: 5px;
        background: var(--surface-strong);
        padding: 1px 5px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.92em;
      }

      details {
        border-top: 1px solid var(--line);
        margin-top: 14px;
        padding-top: 12px;
      }

      summary {
        cursor: pointer;
        color: var(--teal);
        font-weight: 750;
      }

      mark {
        border-radius: 999px;
        background: rgba(170, 107, 0, 0.15);
        color: var(--amber);
        padding: 3px 8px;
        font-size: 0.76rem;
        font-weight: 750;
      }

      .hero-grid,
      .two-col,
      .timeline-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.75fr);
        gap: 24px;
        align-items: stretch;
      }

      .lede {
        max-width: 960px;
        color: #26342f;
        font-size: clamp(1.18rem, 2.2vw, 1.9rem);
        line-height: 1.38;
      }

      .metric-row,
      .stream-grid,
      .decision-grid,
      .coverage-board,
      .risk-grid,
      .provider-board,
      .fix-grid,
      .hotspot-grid,
      .source-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 14px;
      }

      .metric,
      .stream-card,
      .decision-card,
      .coverage-card,
      .risk-card,
      .source-card,
      .callout,
      .hotspot-card,
      .note-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .metric b,
      .coverage-card b,
      .source-card b {
        display: block;
        color: var(--ink);
        font-size: clamp(2.05rem, 4vw, 4rem);
        line-height: 1;
      }

      .metric span,
      .coverage-card span,
      .source-card span {
        display: block;
        color: var(--muted);
        margin-top: 8px;
      }

      .callout {
        display: grid;
        align-content: center;
        background: #12211d;
        color: #f6fff7;
      }

      .callout strong {
        color: var(--green);
      }

      .callout p:last-child {
        margin-bottom: 0;
      }

      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .filter-row button[aria-pressed="true"] {
        border-color: var(--teal);
        background: var(--teal);
        color: #ffffff;
      }

      .card-topline {
        display: flex;
        min-height: 28px;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .stream-card,
      .decision-card,
      .risk-card,
      .hotspot-card {
        transition: opacity 140ms ease, transform 140ms ease, border-color 140ms ease;
      }

      .stream-card[data-accent="blue"],
      .decision-card[data-accent="blue"] {
        border-top: 4px solid var(--blue);
      }

      .stream-card[data-accent="green"],
      .decision-card[data-accent="green"] {
        border-top: 4px solid var(--green);
      }

      .stream-card[data-accent="amber"],
      .decision-card[data-accent="amber"] {
        border-top: 4px solid var(--amber);
      }

      .stream-card[data-accent="coral"],
      .decision-card[data-accent="coral"] {
        border-top: 4px solid var(--coral);
      }

      .stream-card.is-dimmed,
      .decision-card.is-dimmed,
      .risk-card.is-dimmed,
      .hotspot-card.is-dimmed {
        opacity: 0.26;
      }

      .activity-list {
        display: grid;
        gap: 12px;
        padding: 0;
        list-style: none;
      }

      .activity-row {
        display: grid;
        grid-template-columns: 118px minmax(160px, 1fr) minmax(210px, 2fr);
        gap: 14px;
        align-items: center;
      }

      .activity-row time {
        color: var(--muted);
        font-weight: 750;
      }

      .activity-bar {
        display: block;
        width: calc(var(--size) * 100%);
        min-width: 44px;
        min-height: 34px;
        border-radius: 6px;
        background: linear-gradient(90deg, var(--blue), var(--teal));
        color: #ffffff;
        padding: 7px 10px;
        font-weight: 800;
      }

      .activity-row:nth-child(3n + 2) .activity-bar {
        background: linear-gradient(90deg, var(--green), var(--teal));
      }

      .activity-row:nth-child(3n) .activity-bar {
        background: linear-gradient(90deg, var(--amber), var(--coral));
      }

      .activity-theme {
        color: #26342f;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .stack-step {
        border: 1px solid var(--line);
        border-left: 6px solid var(--teal);
        border-radius: 8px;
        background: var(--surface);
        padding: 16px;
      }

      .stack-step:nth-child(2) {
        border-left-color: var(--green);
      }

      .stack-step:nth-child(3) {
        border-left-color: var(--amber);
      }

      .stack-step:nth-child(4) {
        border-left-color: var(--coral);
      }

      .stack-step:nth-child(5) {
        border-left-color: var(--violet);
      }

      .flow {
        display: grid;
        grid-template-columns: repeat(4, minmax(160px, 1fr));
        gap: 12px;
        align-items: stretch;
      }

      .flow-node {
        position: relative;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 18px;
        min-height: 132px;
      }

      .flow-node:not(:last-child)::after {
        content: "->";
        position: absolute;
        top: 50%;
        right: -20px;
        transform: translateY(-50%);
        color: var(--amber);
        font-weight: 900;
      }

      .flow-node b,
      .stack-step b,
      .risk-card b,
      .hotspot-card b {
        display: block;
        margin-bottom: 8px;
      }

      .provider-board {
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      }

      .provider {
        min-height: 100px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 16px;
      }

      .provider b {
        display: block;
        margin-bottom: 8px;
      }

      .provider span {
        color: var(--muted);
      }

      .risk-card.before {
        border-top: 4px solid var(--coral);
      }

      .risk-card.after {
        border-top: 4px solid var(--green);
      }

      .coverage-card {
        min-height: 132px;
      }

      .coverage-card[data-kind="docs"] b,
      .coverage-card[data-kind="artifact"] b,
      .coverage-card[data-kind="matrix"] b {
        font-size: clamp(1.55rem, 3vw, 2.4rem);
      }

      .source-card {
        background: var(--surface-strong);
      }

      .slide-note {
        max-width: 940px;
        color: var(--muted);
        font-size: 1.06rem;
      }

      .mini-label {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .takeaway {
        max-width: 980px;
        font-size: clamp(1.25rem, 2.5vw, 2rem);
        line-height: 1.38;
      }

      .takeaway strong {
        color: var(--teal);
      }

      .check-list {
        display: grid;
        gap: 10px;
        padding: 0;
        list-style: none;
      }

      .check-list li {
        border-left: 5px solid var(--green);
        background: rgba(255, 255, 255, 0.78);
        padding: 12px 14px;
      }

      @media (max-width: 980px) {
        .deck-nav {
          grid-template-columns: auto auto minmax(130px, 1fr) auto;
        }

        .counter {
          display: none;
        }

        .hero-grid,
        .two-col,
        .timeline-layout,
        .flow {
          grid-template-columns: 1fr;
        }

        .flow-node:not(:last-child)::after {
          top: auto;
          right: auto;
          left: 18px;
          bottom: -22px;
          transform: rotate(90deg);
        }
      }

      @media (max-width: 680px) {
        .deck-nav {
          inset: 8px;
          width: calc(100vw - 16px);
          grid-template-columns: 1fr 1fr;
        }

        .deck-nav select,
        .progress-track {
          grid-column: 1 / -1;
        }

        .slide {
          padding: 134px 16px 64px;
        }

        .activity-row {
          grid-template-columns: 1fr;
          border-bottom: 1px solid var(--line);
          padding-bottom: 12px;
        }
      }

      @media print {
        body {
          background: #ffffff;
        }

        .deck-nav {
          display: none;
        }

        .slide,
        .slide.is-active {
          display: block;
          min-height: 100vh;
          padding: 32px;
          break-after: page;
        }

        details {
          display: block;
        }

        details > * {
          display: block;
        }

        .stream-card.is-dimmed,
        .decision-card.is-dimmed,
        .risk-card.is-dimmed,
        .hotspot-card.is-dimmed {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <nav class="deck-nav" aria-label="Presentation navigation">
      <button type="button" data-action="prev" aria-label="Previous slide">Prev</button>
      <button type="button" data-action="next" aria-label="Next slide">Next</button>
      <select aria-label="Jump to slide" data-jump></select>
      <span class="counter" data-counter>1 / 1</span>
      <button type="button" data-action="notes" aria-pressed="false">Notes</button>
      <span class="progress-track" aria-hidden="true"><span class="progress-fill" data-progress></span></span>
    </nav>

    <main id="deck" aria-live="polite"></main>

    <script>
      const workstreams = [
        {
          id: "contracts",
          label: "API Contracts",
          accent: "blue",
          summary: "Daemon-owned schemas now drive generated docs and frontend DTOs.",
          features: [
            "Source-of-truth API contract in daemon/src/api/contract.ts",
            "Generated API.md and docs/api-contract.json",
            "Frontend client types derived from the shared contract"
          ],
          fixes: [
            "Removed stale Settings shape casts",
            "Stopped frontend-local DTOs from drifting away from daemon validation"
          ],
          evidence: ["docs:api:check", "src/lib/api-contract.test.ts", "TASK-045 and TASK-046"]
        },
        {
          id: "ai",
          label: "AI Runtime",
          accent: "green",
          summary: "Persisted Settings became the runtime source for LLM and embedding execution.",
          features: [
            "OpenAI, Ollama, Anthropic, OpenRouter, DeepSeek, and custom OpenAI-compatible LLMs",
            "OpenAI, Ollama, and custom OpenAI-compatible embeddings",
            "Provider-aware connectivity tests and runtime capability responses"
          ],
          fixes: [
            "Degraded mode reflects effective runtime capability",
            "Redacted secrets are never saved back as literal placeholder values"
          ],
          evidence: ["provider request-shape tests", "npm run check", "TASK-041 and TASK-052"]
        },
        {
          id: "backup",
          label: "Backup & Restore",
          accent: "green",
          summary: "Backup moved from useful snapshotting to safer verification, encryption, rollback, and restart recovery.",
          features: [
            "Packaged backup CLI for create, list, verify, and restore",
            "In-app backup verification and encrypted package creation",
            "In-app encrypted package verify and restore",
            "Post-restore restart, health polling, and rollback guidance"
          ],
          fixes: [
            "Checksum-required restore",
            "Temporary restored database migrations",
            "Rollback copy before replacement",
            "Passwords are per-operation and not persisted"
          ],
          evidence: ["backup integration tests", "Settings restore tests", "TASK-044, TASK-049 to TASK-051, TASK-057, TASK-066, TASK-067"]
        },
        {
          id: "distribution",
          label: "Distribution",
          accent: "blue",
          summary: "Release artifacts became the shared substrate for install, Homebrew, and upgrade paths.",
          features: [
            "Signed or signature-ready release archive packaging",
            "One-command installer entry point",
            "Homebrew formula install path",
            "Packaged update install and upgrade flow"
          ],
          fixes: [
            "Unsafe archive member rejection",
            "macOS metadata sidecar exclusion from portable archives",
            "Loopback-only Docker publishing with single-container static app serving"
          ],
          evidence: ["release:validate", "installer matrix", "installed-app smoke", "TASK-042, TASK-053, TASK-059 to TASK-063"]
        },
        {
          id: "updates",
          label: "Updates",
          accent: "amber",
          summary: "Update checks landed as read-only first, then explicit upgrade commands were added.",
          features: [
            "littleimp update check",
            "GET /updates/check",
            "Settings update check panel",
            "littleimp update install with archive verification"
          ],
          fixes: [
            "Private and loopback update sources are rejected by daemon validation",
            "Malformed release tags do not poison update selection",
            "Install only proceeds after checksum and optional signature verification"
          ],
          evidence: ["cli update tests", "daemon update route tests", "TASK-054 to TASK-056, TASK-061"]
        },
        {
          id: "recovery",
          label: "Pipeline Recovery",
          accent: "amber",
          summary: "Failed ingestion, enrichment, and embedding work became visible and retryable.",
          features: [
            "Library reprocess jobs",
            "Failed-only retry mode",
            "Embedding-only regeneration",
            "Bookmark-level failure guidance and Settings links"
          ],
          fixes: [
            "Queue retry persistence",
            "Manual titles, tags, categories, and notes are preserved by default",
            "Retry actions do not create duplicate bookmarks"
          ],
          evidence: ["daemon pipeline tests", "PipelineRecoveryPanel tests", "TASK-004, TASK-064, TASK-065"]
        },
        {
          id: "diagnostics",
          label: "Diagnostics",
          accent: "coral",
          summary: "Local support bundles expose health and environment state without telemetry.",
          features: [
            "GET /diagnostics",
            "littleimp diagnostics with JSON output",
            "Settings diagnostics copy and export actions"
          ],
          fixes: [
            "API keys, PIN hashes, S3 secrets, and backup passwords are redacted",
            "Support context is generated locally and shared only by user choice"
          ],
          evidence: ["diagnostics integration tests", "Settings diagnostics tests", "TASK-068 in current workspace"],
          status: "in workspace"
        },
        {
          id: "validation",
          label: "Validation",
          accent: "green",
          summary: "Release confidence shifted from source checks to installed-artifact checks.",
          features: [
            "Installed-app E2E smoke suite",
            "Linux installer matrix",
            "MVP evidence and acceptance audit",
            "CI and local quality gates"
          ],
          fixes: [
            "Release archive portability bug found during Linux validation",
            "Stale task, roadmap, and PRD contradictions cleaned up",
            "Installed smoke output points to logs and diagnostics"
          ],
          evidence: ["149 frontend tests", "358 daemon tests", "npm run test:e2e:installed", "TASK-043, TASK-048, TASK-058, TASK-062, TASK-070"]
        }
      ];

      const activity = [
        { date: "2026-05-13", commits: 6, theme: "runtime settings, contracts, Docker safety, backup restore hardening" },
        { date: "2026-05-14", commits: 1, theme: "release and roadmap documentation alignment" },
        { date: "2026-05-15", commits: 6, theme: "backup CLI, queue retries, release validation" },
        { date: "2026-05-18", commits: 5, theme: "AI providers, update checks, native frontend bundle" },
        { date: "2026-05-19", commits: 1, theme: "daemon update check service" },
        { date: "2026-05-20", commits: 4, theme: "in-app updates, encrypted backups, MVP evidence audit" },
        { date: "2026-05-26", commits: 4, theme: "release packaging, one-command installer, upgrade flow" },
        { date: "2026-05-27", commits: 7, theme: "installer validation, recovery UX, Homebrew, installed smoke" }
      ];

      const decisions = [
        {
          stream: "contracts",
          title: "Make the daemon contract authoritative",
          choice: "Route schemas generate docs and frontend types instead of maintaining parallel shapes.",
          consequence: "Settings, backup, search, suggestions, and timeline integrations now fail at type or docs drift time instead of at runtime."
        },
        {
          stream: "ai",
          title: "Persisted Settings drive runtime execution",
          choice: "Environment variables remain install-time defaults; saved Settings resolve live LLM and embedding capability.",
          consequence: "Users can change providers in the app and have ingestion, search, MCP, and organization behavior follow the same source."
        },
        {
          stream: "backup",
          title: "Restore stays explicit and restart-bound",
          choice: "Restore validates checksums, creates rollback data, replaces the database safely, and requires daemon restart before normal use.",
          consequence: "The UX is less magical, but the data-integrity model is clear and reviewable for MVP."
        },
        {
          stream: "distribution",
          title: "Release archives are the install substrate",
          choice: "One-command install, manual archive install, Homebrew, and upgrade all consume checksum-verified packaged archives.",
          consequence: "The project validates one artifact layout instead of letting each installer path invent packaging rules."
        },
        {
          stream: "updates",
          title: "Read-only checks before install commands",
          choice: "The update system first reported availability, then added an explicit user-invoked packaged upgrade command.",
          consequence: "Contributors can review release selection separately from the riskier download, verify, install, restart, and rollback path."
        },
        {
          stream: "distribution",
          title: "Docker remains local-only by default",
          choice: "The container can bind internally to all interfaces, but host publishing is loopback-only and remote exposure requires external auth.",
          consequence: "The unauthenticated daemon trust boundary is consistent across native and Docker installs."
        },
        {
          stream: "recovery",
          title: "Recovery jobs preserve user edits",
          choice: "Reprocess and retry paths regenerate failed or provider-dependent work without overwriting manual fields by default.",
          consequence: "Fixing provider configuration no longer forces users to delete and recreate bookmarks."
        }
      ];

      const fixes = [
        { stream: "recovery", title: "Queue retries persist", detail: "Job retry metadata now survives daemon restart instead of resetting transiently." },
        { stream: "backup", title: "Restore verifies first", detail: "Local and remote restore paths validate manifests and checksums before replacement." },
        { stream: "distribution", title: "Docker loopback boundary", detail: "Default compose and docker run paths publish 127.0.0.1 only." },
        { stream: "distribution", title: "Archive portability", detail: "Packaging skips macOS sidecar metadata and rejects unsupported archive entries." },
        { stream: "contracts", title: "Contract drift check", detail: "Generated API docs and frontend types are checked against daemon-owned schemas." },
        { stream: "updates", title: "Source safety", detail: "Private and loopback update source hosts are rejected before outbound checks." }
      ];

      const evidence = [
        { kind: "tests", value: "149", label: "frontend tests after latest pre-commit gate" },
        { kind: "tests", value: "358", label: "daemon tests after latest pre-commit gate" },

      const streamAccent = new Map(workstreams.map((stream) => [stream.id, stream.accent]));

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");

      function list(items) {
        return `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
      }

      function workstreamCards() {
        return workstreams.map((stream) => `
          <article class="stream-card" data-stream="${stream.id}" data-accent="${stream.accent}">

      function activityBars() {
        const max = Math.max(...activity.map((item) => item.commits));

      function decisionCards() {
        return decisions.map((decision) => `
          <article class="decision-card" data-stream="${decision.stream}" data-accent="${streamAccent.get(decision.stream) || "blue"}">
            <div class="card-topline">${escapeHtml(workstreams.find((stream) => stream.id === decision.stream)?.label || "Decision")}</div>
            <h3>${escapeHtml(decision.title)}</h3>
            <p><strong>Choice:</strong> ${escapeHtml(decision.choice)}</p>
            <p><strong>Consequence:</strong> ${escapeHtml(decision.consequence)}</p>
          </article>
        `).join("");
      }

      function fixCards() {
        return fixes.map((fix) => `
          <article class="risk-card after" data-stream="${fix.stream}">

      function coverageCards() {
        return evidence.map((item) => `
          <article class="coverage-card" data-kind="${item.kind}">
            <b>${escapeHtml(item.value)}</b>

      function sourceCards() {
        return sources.map((item) => `
          <article class="source-card">
            <b>${escapeHtml(item.value)}</b>

      const slides = [

        },
        {

                <div class="stack-step"><b>Phase 2: daemon endpoint</b><span><code>GET /updates/check</code> exposes the same service to the app with source validation.</span></div>

          body: `

              <article class="hotspot-card" data-stream="backup"><b>Restore UX edge cases</b><span>Restart and rollback guidance should stay consistent across Settings, CLI, and daemon responses.</span></article>
              <article class="hotspot-card" data-stream="ai"><b>Provider request shapes</b><span>New providers should use provider-aware tests instead of assuming OpenAI-compatible behavior.</span></article>
              <article class="hotspot-card" data-stream="validation"><b>Installed-app smoke cost</b><span>Keep the suite release-blocking while avoiding duplication with lower-level unit and integration tests.</span></article>

      const deck = document.querySelector("#deck");
      const counter = document.querySelector("[data-counter]");
      const progress = document.querySelector("[data-progress]");
      const jump = document.querySelector("[data-jump]");
      const notesButton = document.querySelector("[data-action='notes']");
      let activeIndex = 0;
      let activeFilter = "all";
      let notesOpen = false;

      function renderSlides() {
        deck.innerHTML = slides.map((slide, index) => `
          <section class="slide${index === 0 ? " is-active" : ""}" data-slide="${index}" data-stream="${slide.stream}" tabindex="-1" aria-labelledby="slide-title-${index}">
            <p class="eyebrow">${escapeHtml(slide.eyebrow)}</p>
            <h1 id="slide-title-${index}">${escapeHtml(slide.title)}</h1>
            ${slide.body}
          </section>
        `).join("");
      }

      function renderJumpMenu() {
        jump.innerHTML = slides.map((slide, index) => `<option value="${index}">${index + 1}. ${escapeHtml(slide.title)}</option>`).join("");
      }

      function renderFilters() {
        const filterMarkup = [
          `<button type="button" data-filter="all">All</button>`,
          ...workstreams.map((stream) => `<button type="button" data-filter="${stream.id}">${escapeHtml(stream.label)}</button>`)
        ].join("");
        document.querySelectorAll("[data-filters]").forEach((container) => {
          container.innerHTML = filterMarkup;
        });
      }

      function applyFilter(filter) {
        activeFilter = filter || "all";
        document.querySelectorAll("[data-filter]").forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.filter === activeFilter));
        });
        document.querySelectorAll(".stream-card, .decision-card, .risk-card, .hotspot-card").forEach((element) => {
          const stream = element.dataset.stream;
          const relevant = activeFilter === "all" || stream === activeFilter || stream === "all";
          element.classList.toggle("is-dimmed", !relevant);
        });
      }

      function setNotes(open) {
        notesOpen = open;
        notesButton.setAttribute("aria-pressed", String(notesOpen));
        notesButton.textContent = notesOpen ? "Hide notes" : "Notes";
        document.querySelectorAll("details").forEach((detail) => {
          detail.open = notesOpen;
        });
      }

      function showSlide(index, shouldFocus = true) {
        const nextIndex = Math.max(0, Math.min(index, slides.length - 1));
        const slideElements = [...document.querySelectorAll(".slide")];
        slideElements.forEach((slide, slideIndex) => {
          slide.classList.toggle("is-active", slideIndex === nextIndex);
        });
        activeIndex = nextIndex;
        counter.textContent = `${activeIndex + 1} / ${slides.length}`;
        progress.style.setProperty("--progress", `${((activeIndex + 1) / slides.length) * 100}%`);
        jump.value = String(activeIndex);
        if (shouldFocus) {
          slideElements[activeIndex]?.focus({ preventScroll: true });
        }
      }

      function bindNavigation() {
        document.querySelector("[data-action='prev']").addEventListener("click", () => showSlide(activeIndex - 1));
        document.querySelector("[data-action='next']").addEventListener("click", () => showSlide(activeIndex + 1));
        jump.addEventListener("change", (event) => showSlide(Number(event.target.value)));
        notesButton.addEventListener("click", () => setNotes(!notesOpen));
        document.addEventListener("keydown", (event) => {
          const tagName = event.target.tagName;
          if (tagName === "SELECT" || tagName === "BUTTON" || tagName === "SUMMARY") return;
          if (event.key === "ArrowLeft") showSlide(activeIndex - 1);
          if (event.key === "ArrowRight" || event.key === " ") showSlide(activeIndex + 1);
          if (event.key === "Home") showSlide(0);
          if (event.key === "End") showSlide(slides.length - 1);
        });
      }

      function bindFilters() {
        document.addEventListener("click", (event) => {
          const button = event.target.closest("[data-filter]");
          if (!button) return;
          applyFilter(button.dataset.filter);
        });
      }

      renderSlides();
      renderJumpMenu();
      renderFilters();
      bindNavigation();
      bindFilters();
      applyFilter("all");
      showSlide(0, false);
    </script>
