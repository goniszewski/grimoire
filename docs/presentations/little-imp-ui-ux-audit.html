<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Little Imp UI and UX Audit</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f8;
        --surface: #ffffff;
        --surface-2: #eef1f5;
        --ink: #151923;
        --muted: #5c6472;
        --line: #d8dde6;
        --primary: #7c3aed;
        --primary-2: #5b21b6;
        --teal: #0f766e;
        --blue: #2563eb;
        --green: #16a34a;
        --amber: #d97706;
        --red: #dc2626;
        --shadow: 0 20px 50px rgba(19, 24, 35, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .deck-nav {
        position: fixed;
        inset: 14px 14px auto;
        z-index: 50;
        display: grid;
        grid-template-columns: auto auto minmax(220px, 420px) auto auto;
        gap: 8px;
        align-items: center;
        width: min(calc(100vw - 28px), 1040px);
        padding: 10px;
        border: 1px solid rgba(216, 221, 230, 0.9);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .deck-nav button,
      .deck-nav select,
      .filter-bar button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--ink);
        padding: 0 12px;
      }

      .deck-nav button:hover,
      .filter-bar button:hover {
        border-color: var(--primary);
      }

      .deck-nav button:focus-visible,
      .deck-nav select:focus-visible,
      .filter-bar button:focus-visible,
      .slide:focus-visible {
        outline: 3px solid rgba(124, 58, 237, 0.28);
        outline-offset: 2px;
      }

      .deck-nav select {
        width: 100%;
      }

      .progress-track {
        grid-column: 1 / -1;
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--surface-2);
      }

      .progress-fill {
        display: block;
        width: var(--progress, 4%);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--primary), var(--blue), var(--teal));
        transition: width 160ms ease;
      }

      .counter {
        color: var(--muted);
        font-size: 0.88rem;
        white-space: nowrap;
      }

      main {
        min-height: 100vh;
      }

      .slide {
        display: none;
        min-height: 100vh;
        padding: 112px clamp(20px, 4vw, 70px) 70px;
      }

      .slide.is-active {
        display: grid;
        align-content: center;
        gap: 24px;
      }

      .eyebrow {
        margin: 0;
        color: var(--primary-2);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 1180px;
        margin-bottom: 0;
        font-size: clamp(2.5rem, 7vw, 6.4rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      h2 {
        margin-bottom: 4px;
        font-size: clamp(1.7rem, 3.2vw, 3rem);
        line-height: 1.06;
        letter-spacing: 0;
      }

      h3 {
        margin-bottom: 8px;
        font-size: 1rem;
        line-height: 1.25;
        letter-spacing: 0;
      }

      p,
      li {
        line-height: 1.5;
      }

      ul {
        margin-top: 0;
        padding-left: 1.1rem;
      }

      code {
        border: 1px solid var(--line);
        border-radius: 5px;
        background: var(--surface-2);
        padding: 1px 5px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.92em;
      }

      .hero-grid,
      .two-col {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.8fr);
        gap: 24px;
        align-items: stretch;
      }

      .lede {
        max-width: 820px;
        color: var(--muted);
        font-size: clamp(1rem, 1.6vw, 1.28rem);
      }

      .panel,
      .screen-frame,
      .metric,
      .palette-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 1px 0 rgba(19, 24, 35, 0.03);
      }

      .panel {
        padding: 22px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .metric {
        padding: 18px;
      }

      .metric strong {
        display: block;
        font-size: clamp(1.6rem, 3.8vw, 3.2rem);
        line-height: 1;
      }

      .metric span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .tag-row,
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        padding: 0 10px;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .pill.priority-high {
        border-color: rgba(220, 38, 38, 0.34);
        background: rgba(220, 38, 38, 0.08);
        color: #991b1b;
      }

      .pill.priority-medium {
        border-color: rgba(217, 119, 6, 0.34);
        background: rgba(217, 119, 6, 0.08);
        color: #92400e;
      }

      .pill.priority-low {
        border-color: rgba(37, 99, 235, 0.28);
        background: rgba(37, 99, 235, 0.08);
        color: #1d4ed8;
      }

      .screen-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.28fr) minmax(340px, 0.72fr);
        gap: 22px;
        align-items: stretch;
      }

      .screen-frame {
        overflow: hidden;
        min-height: 420px;
        display: grid;
        align-content: center;
        background:
          linear-gradient(45deg, rgba(21, 25, 35, 0.04) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(21, 25, 35, 0.04) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(21, 25, 35, 0.04) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(21, 25, 35, 0.04) 75%),
          #f9fafb;
        background-size: 24px 24px;
        background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      }

      .screen-frame img {
        display: block;
        width: 100%;
        max-height: 68vh;
        object-fit: contain;
        cursor: zoom-in;
      }

      .screen-frame img:focus-visible {
        outline: 3px solid rgba(124, 58, 237, 0.9);
        outline-offset: 4px;
      }

      .image-viewer[hidden] {
        display: none;
      }

      .image-viewer {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        overflow: hidden;
        touch-action: none;
      }

      .image-viewer-backdrop {
        position: absolute;
        inset: 0;
        border: 0;
        background: rgba(15, 23, 42, 0.76);
        backdrop-filter: blur(6px);
        cursor: pointer;
      }

      .image-viewer > img {
        position: relative;
        z-index: 1;
        display: block;
        width: auto;
        height: auto;
        max-width: none;
        max-height: none;
        user-select: none;
        cursor: grab;
        image-rendering: auto;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.34);
        will-change: transform, width;
      }

      .image-viewer > img.is-dragging {
        cursor: grabbing;
      }

      .analysis {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .analysis-section {
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }

      .analysis-section:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .analysis-section h3 {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .analysis-section p,
      .analysis-section li {
        color: var(--muted);
        font-size: 0.93rem;
      }

      .inventory {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .inventory a {
        min-height: 92px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: inherit;
        padding: 12px;
        text-decoration: none;
      }

      .inventory a:hover {
        border-color: var(--primary);
        box-shadow: 0 8px 20px rgba(124, 58, 237, 0.09);
      }

      .inventory strong {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
      }

      .inventory code {
        font-size: 0.76rem;
      }

      .palette-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
      }

      .swatch {
        height: 84px;
        border-radius: 7px 7px 0 0;
      }

      .palette-card div:last-child {
        padding: 10px;
      }

      .palette-card strong,
      .palette-card code {
        display: block;
      }

      .priority-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .priority-grid li {
        margin-bottom: 8px;
      }

      .note {
        border-left: 4px solid var(--primary);
        background: rgba(124, 58, 237, 0.08);
        padding: 14px 16px;
        color: var(--muted);
      }

      @media (max-width: 1050px) {
        .deck-nav {
          grid-template-columns: auto auto minmax(0, 1fr);
        }

        .deck-nav .counter,
        .deck-nav .home-btn {
          display: none;
        }

        .hero-grid,
        .two-col,
        .screen-layout,
        .priority-grid {
          grid-template-columns: 1fr;
        }

        .metrics,
        .inventory,
        .palette-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .deck-nav {
          inset: 8px;
          width: calc(100vw - 16px);
        }

        .slide {
          padding: 108px 14px 42px;
        }

        .metrics,
        .inventory,
        .palette-grid {
          grid-template-columns: 1fr;
        }
      }

      @media print {
        .deck-nav {
          display: none;
        }

        .slide {
          display: block;
          min-height: auto;
          page-break-after: always;
          padding: 24px;
        }

        .screen-layout,
        .hero-grid,
        .two-col {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

      function clamp(value, min, max) {

      function updateImageViewer() {
        if (viewerBaseWidth > 0) {
          imageViewerImage.style.width = `${Math.round(viewerBaseWidth * viewerZoom)}px`;

        imageViewerImage.style.transform = `translate3d(${viewerPanX}px, ${viewerPanY}px, 0)`;
      }

      function setImageViewerBaseSize() {
        const naturalWidth = imageViewerImage.naturalWidth || 1;
        const naturalHeight = imageViewerImage.naturalHeight || 1;
        const maxWidth = window.innerWidth * 0.92;
        const maxHeight = window.innerHeight * 0.9;
        const fitScale = Math.min(maxWidth / naturalWidth, maxHeight / naturalHeight, 1);
        viewerBaseWidth = Math.max(1, Math.round(naturalWidth * fitScale));
        viewerMaxZoom = Math.max(1, Math.min(4, naturalWidth / viewerBaseWidth));
        viewerZoom = clamp(viewerZoom, 0.5, viewerMaxZoom);
        updateImageViewer();
      }

      function resetImageViewer() {
        viewerZoom = 1;
        viewerPanX = 0;
        viewerPanY = 0;
        viewerDrag = null;
        imageViewerImage.classList.remove("is-dragging");
        updateImageViewer();

      function openImageViewer(sourceImage) {
        lastFocusedElement = document.activeElement;

        imageViewerImage.src = sourceImage.src;

          setImageViewerBaseSize();
          imageViewerImage.focus({ preventScroll: true });
        };

        if (imageViewerImage.complete && imageViewerImage.naturalWidth) {
          prepareImage();
        } else {
          imageViewerImage.onload = prepareImage;

        viewerMaxZoom = 1;

        if (!viewerDrag || viewerDrag.pointerId !== event.pointerId) return;
        viewerPanX = viewerDrag.panX + event.clientX - viewerDrag.startX;
        viewerPanY = viewerDrag.panY + event.clientY - viewerDrag.startY;
        updateImageViewer();
      });
      function stopImageViewerDrag(event) {
        if (!viewerDrag || viewerDrag.pointerId !== event.pointerId) return;
        viewerDrag = null;
        imageViewerImage.classList.remove("is-dragging");
        if (imageViewerImage.hasPointerCapture(event.pointerId)) {
          imageViewerImage.releasePointerCapture(event.pointerId);
        }
      }
      imageViewerImage.addEventListener("pointerup", stopImageViewerDrag);
      imageViewerImage.addEventListener("pointercancel", stopImageViewerDrag);
      imageViewerImage.addEventListener("dblclick", resetImageViewer);

      document.querySelectorAll("[data-slide-index]").forEach((item) => {
        item.addEventListener("click", (event) => {
          event.preventDefault();
          showSlide(Number(item.dataset.slideIndex));
        });
      });

      document.querySelectorAll("[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          const filter = button.dataset.filter;
          document.querySelectorAll("[data-inventory-type]").forEach((item) => {
            const type = item.dataset.inventoryType;
            const isResponsive = type.includes("Responsive");
            const visible = filter === "all" || type === filter || (filter === "Responsive" && isResponsive) || (filter === "State" && type.includes("state"));
            item.style.display = visible ? "" : "none";
          });
        });
      });

      const initialHash = window.location.hash.replace("#", "");
      const initialIndex = initialHash ? slides.findIndex((slide) => slide.id === initialHash) : 0;
      showSlide(initialIndex >= 0 ? initialIndex : 0);
    </script>
  </body>
</html>
