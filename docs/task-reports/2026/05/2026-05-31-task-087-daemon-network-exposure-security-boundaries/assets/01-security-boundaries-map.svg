<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">TASK-087 daemon network exposure security boundaries</title>
  <desc id="desc">A visual summary of the loopback daemon boundary, local integration clients, and blocked public-network exposure gates.</desc>
  <rect width="1200" height="620" fill="#f7f7fa"/>
  <rect x="48" y="42" width="1104" height="536" rx="24" fill="#ffffff" stroke="#dedfec" stroke-width="2"/>
  <text x="90" y="106" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">TASK-087: Security Boundaries</text>
  <text x="90" y="146" fill="#626475" font-family="Inter, Arial, sans-serif" font-size="20">Loopback remains the secure default; public exposure stays blocked until explicit gates pass.</text>

  <rect x="84" y="198" width="294" height="254" rx="14" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/>
  <text x="112" y="240" fill="#14532d" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Trusted Loopback</text>
  <text x="112" y="288" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- First-party UI</text>
  <text x="112" y="326" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- Packaged CLI</text>
  <text x="112" y="364" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- Local MCP clients</text>
  <text x="112" y="402" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- User scripts</text>

  <rect x="453" y="198" width="294" height="254" rx="14" fill="#eff6ff" stroke="#0f7fbf" stroke-width="2"/>
  <text x="481" y="240" fill="#075985" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Daemon Controls</text>
  <text x="481" y="288" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- Loopback bind</text>
  <text x="481" y="326" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- Origin checks</text>
  <text x="481" y="364" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- Secret redaction</text>
  <text x="481" y="402" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- Backup safeguards</text>

  <rect x="822" y="198" width="294" height="254" rx="14" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
  <text x="850" y="240" fill="#7c2d12" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Blocked Exposure</text>
  <text x="850" y="288" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- LAN/public bind</text>
  <text x="850" y="326" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- Public MCP/API</text>
  <text x="850" y="364" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- Browser capture</text>
  <text x="850" y="402" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20">- Multi-user mode</text>

  <path d="M382 325 H444" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M751 325 H813" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 14"/>
  <text x="93" y="516" fill="#191827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Release gate:</text>
  <text x="223" y="516" fill="#626475" font-family="Inter, Arial, sans-serif" font-size="20">auth, origin policy, CSRF, route review, redaction, quotas, tests, and docs must pass before public mode.</text>
</svg>
