<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">TASK-094 bookmark mutation regression matrix</title>
  <desc id="desc">Three-column visual summary showing supported bookmark mutations covered, unsupported patch fields rejected, and unsupported detail edit affordances removed.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2937" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="72" y="64" width="1136" height="592" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="112" y="126" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800">Bookmark Mutation Regression Tests</text>
  <text x="112" y="164" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">TASK-094 closes gaps around supported fields, rejected patches, and detail controls.</text>

  <g transform="translate(112 220)">
    <rect width="328" height="332" rx="12" fill="#f8fafc" stroke="#dbe4f0"/>
    <circle cx="38" cy="42" r="15" fill="#16a34a"/>
    <path d="M30 42l6 6 12-15" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="68" y="49" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">Supported Fields</text>
    <text x="28" y="102" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">title</text>
    <text x="28" y="138" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">tags and category_id</text>
    <text x="28" y="174" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">notes</text>
    <text x="28" y="210" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">pin, archive, read</text>
    <text x="28" y="246" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">read later</text>
    <text x="28" y="282" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">clear nullable fields</text>
  </g>

  <g transform="translate(476 220)">
    <rect width="328" height="332" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <circle cx="38" cy="42" r="15" fill="#ea580c"/>
    <path d="M31 35l14 14M45 35L31 49" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="68" y="49" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">Rejected Patches</text>
    <text x="28" y="102" fill="#7c2d12" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">url</text>
    <text x="28" y="138" fill="#7c2d12" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">summary / description</text>
    <text x="28" y="174" fill="#7c2d12" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">opened_count</text>
    <text x="28" y="210" fill="#7c2d12" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">last_opened_at</text>
    <text x="28" y="246" fill="#7c2d12" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">is_trashed</text>
    <text x="28" y="282" fill="#7c2d12" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">created_at</text>
  </g>

  <g transform="translate(840 220)">
    <rect width="328" height="332" rx="12" fill="#f0f9ff" stroke="#bae6fd"/>
    <circle cx="38" cy="42" r="15" fill="#0284c7"/>
    <path d="M30 42h16M38 34v16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="68" y="49" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">Detail UI</text>
    <text x="28" y="102" fill="#0c4a6e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Title remains editable</text>
    <text x="28" y="138" fill="#0c4a6e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Notes remain editable</text>
    <text x="28" y="174" fill="#0c4a6e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Tags remain editable</text>
    <text x="28" y="210" fill="#0c4a6e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">URL stays a native link</text>
    <text x="28" y="246" fill="#0c4a6e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Summary edit removed</text>
    <text x="28" y="282" fill="#0c4a6e" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">URL edit removed</text>
  </g>

  <rect x="112" y="588" width="1056" height="1" fill="#e2e8f0"/>
  <text x="112" y="625" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Verification: focused frontend tests, focused daemon integration tests, lint, type-check, and API docs drift check.</text>
</svg>
