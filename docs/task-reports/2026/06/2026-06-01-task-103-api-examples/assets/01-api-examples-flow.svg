<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">TASK-103 API examples generation flow</title>
  <desc id="desc">A four-step diagram showing contract examples flowing into generated Markdown, generated JSON, drift checks, and local client usage.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2937" flood-opacity=".16"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)"/>
  <g transform="translate(72 64)">
    <text x="0" y="0" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Human-readable API examples</text>
    <text x="0" y="36" fill="#5b6472" font-family="Inter, Arial, sans-serif" font-size="18">Curated local-client examples now include request and response evidence from the generated contract.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="72" y="148" width="238" height="260" rx="8" fill="#ffffff" stroke="#d9deea"/>
    <rect x="340" y="148" width="238" height="260" rx="8" fill="#ffffff" stroke="#d9deea"/>
    <rect x="608" y="148" width="238" height="260" rx="8" fill="#ffffff" stroke="#d9deea"/>
    <rect x="876" y="148" width="252" height="260" rx="8" fill="#ffffff" stroke="#d9deea"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(104 184)">
      <circle cx="20" cy="20" r="20" fill="#2563eb"/>
      <text x="20" y="27" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">1</text>
      <text x="0" y="78" fill="#111827" font-size="22" font-weight="800">Contract examples</text>
      <text x="0" y="112" fill="#5b6472" font-size="15">Routes carry curl snippets,</text>
      <text x="0" y="136" fill="#5b6472" font-size="15">status lines, headers,</text>
      <text x="0" y="160" fill="#5b6472" font-size="15">and JSON bodies.</text>
      <rect x="0" y="190" width="174" height="34" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="14" y="212" fill="#1d4ed8" font-size="14" font-weight="700">daemon/src/api</text>
    </g>
    <g transform="translate(372 184)">
      <circle cx="20" cy="20" r="20" fill="#16a34a"/>
      <text x="20" y="27" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">2</text>
      <text x="0" y="78" fill="#111827" font-size="22" font-weight="800">Generated docs</text>
      <text x="0" y="112" fill="#5b6472" font-size="15">API.md renders paired</text>
      <text x="0" y="136" fill="#5b6472" font-size="15">Request and Response</text>
      <text x="0" y="160" fill="#5b6472" font-size="15">blocks for local clients.</text>
      <rect x="0" y="190" width="126" height="34" rx="6" fill="#ecfdf5" stroke="#bbf7d0"/>
      <text x="14" y="212" fill="#15803d" font-size="14" font-weight="700">API.md</text>
    </g>
    <g transform="translate(640 184)">
      <circle cx="20" cy="20" r="20" fill="#c2410c"/>
      <text x="20" y="27" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">3</text>
      <text x="0" y="78" fill="#111827" font-size="22" font-weight="800">Drift checks</text>
      <text x="0" y="112" fill="#5b6472" font-size="15">docs:api:check compares</text>
      <text x="0" y="136" fill="#5b6472" font-size="15">generated Markdown and</text>
      <text x="0" y="160" fill="#5b6472" font-size="15">contract JSON output.</text>
      <rect x="0" y="190" width="156" height="34" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="14" y="212" fill="#c2410c" font-size="14" font-weight="700">docs:api:check</text>
    </g>
    <g transform="translate(908 184)">
      <circle cx="20" cy="20" r="20" fill="#7c3aed"/>
      <text x="20" y="27" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">4</text>
      <text x="0" y="78" fill="#111827" font-size="22" font-weight="800">Local clients</text>
      <text x="0" y="112" fill="#5b6472" font-size="15">Examples cover tokens,</text>
      <text x="0" y="136" fill="#5b6472" font-size="15">bookmarks, search, import,</text>
      <text x="0" y="160" fill="#5b6472" font-size="15">export, categories, tags, backup.</text>
      <rect x="0" y="190" width="172" height="34" rx="6" fill="#f5f3ff" stroke="#ddd6fe"/>
      <text x="14" y="212" fill="#6d28d9" font-size="14" font-weight="700">curl + JSON</text>
    </g>
  </g>
  <g fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M312 278H338"/>
    <path d="M330 270l8 8-8 8"/>
    <path d="M580 278h26"/>
    <path d="M598 270l8 8-8 8"/>
    <path d="M848 278h26"/>
    <path d="M866 270l8 8-8 8"/>
  </g>
  <g transform="translate(72 456)" font-family="Inter, Arial, sans-serif">
    <rect width="1056" height="56" rx="8" fill="#111827"/>
    <text x="24" y="35" fill="#f9fafb" font-size="17" font-weight="700">Coverage added:</text>
    <text x="174" y="35" fill="#d1d5db" font-size="17">integration auth, bookmark CRUD, filtering and pagination, import/export, categories, tags, backup, and common error flows</text>
  </g>
</svg>
