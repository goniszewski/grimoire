<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Import duplicate policy flow</title>
  <desc id="desc">Netscape import rows are parsed, classified, previewed, and then committed according to duplicate policy choices.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#111827" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="70" y="76" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#111827">TASK-120 Import Duplicate Handling Policy</text>
  <text x="70" y="112" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748b">One classifier drives both non-mutating preview and commit-time create, merge, restore, or skip behavior.</text>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="70" y="185" width="190" height="120" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="100" y="230" font-size="20" font-weight="800" fill="#111827">Upload</text>
    <text x="100" y="262" font-size="15" fill="#475569">Netscape HTML</text>
    <text x="100" y="284" font-size="15" fill="#475569">multipart file</text>

    <rect x="330" y="185" width="210" height="120" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="360" y="230" font-size="20" font-weight="800" fill="#111827">Parse rows</text>
    <text x="360" y="262" font-size="15" fill="#475569">valid bookmarks</text>
    <text x="360" y="284" font-size="15" fill="#475569">invalid/private skips</text>

    <rect x="610" y="185" width="235" height="120" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="640" y="230" font-size="20" font-weight="800" fill="#111827">Classify</text>
    <text x="640" y="262" font-size="15" fill="#475569">new, active duplicate,</text>
    <text x="640" y="284" font-size="15" fill="#475569">archived, trashed</text>

    <rect x="915" y="185" width="215" height="120" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="945" y="230" font-size="20" font-weight="800" fill="#111827">Preview API</text>
    <text x="945" y="262" font-size="15" fill="#475569">summary, rows, tags,</text>
    <text x="945" y="284" font-size="15" fill="#475569">folders, warnings</text>
  </g>

  <g stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M260 245 H323"/>
    <path d="M540 245 H603"/>
    <path d="M845 245 H908"/>
    <path d="M1022 305 C1022 350 970 370 920 390"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="80" y="395" width="230" height="120" rx="8" fill="#ecfdf5" stroke="#86efac"/>
    <text x="110" y="438" font-size="20" font-weight="800" fill="#14532d">Create</text>
    <text x="110" y="470" font-size="15" fill="#166534">new bookmark rows</text>
    <text x="110" y="492" font-size="15" fill="#166534">and enqueue ingest</text>

    <rect x="350" y="395" width="230" height="120" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="380" y="438" font-size="20" font-weight="800" fill="#1e3a8a">Merge</text>
    <text x="380" y="470" font-size="15" fill="#1d4ed8">active duplicates can</text>
    <text x="380" y="492" font-size="15" fill="#1d4ed8">merge tags/category</text>

    <rect x="620" y="395" width="230" height="120" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="650" y="438" font-size="20" font-weight="800" fill="#7c2d12">Restore</text>
    <text x="650" y="470" font-size="15" fill="#9a3412">archived or trashed</text>
    <text x="650" y="492" font-size="15" fill="#9a3412">duplicates can merge</text>

    <rect x="890" y="395" width="230" height="120" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="920" y="438" font-size="20" font-weight="800" fill="#334155">Skip</text>
    <text x="920" y="470" font-size="15" fill="#475569">invalid, private, or</text>
    <text x="920" y="492" font-size="15" fill="#475569">policy-skipped rows</text>
  </g>

  <g stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M920 390 C740 340 270 340 195 390"/>
    <path d="M920 390 C770 355 560 355 465 390"/>
    <path d="M920 390 C825 370 765 370 735 390"/>
    <path d="M940 390 C940 370 970 370 1005 390"/>
  </g>

  <text x="70" y="575" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">SSE progress now reports queued, skipped, merged, restored, category creation, and completion state.</text>
</svg>
