<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Little Imp public documentation polish map</title>
  <desc id="desc">A diagram showing the refreshed public README, FAQ, security guide, contributing guide, task board, and verification audit.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f4f6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#0f7fbf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2937" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f7f7fa"/>
  <rect x="52" y="48" width="1096" height="524" rx="28" fill="url(#panel)" stroke="#dedfec" filter="url(#shadow)"/>
  <text x="96" y="116" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800" fill="#7c3aed">TASK-135</text>
  <text x="96" y="158" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800" fill="#191827">Public Documentation Polish</text>
  <text x="96" y="194" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#626475">First-time visitor docs now match the private prerelease reality and local-first security model.</text>

  <g transform="translate(96 252)">
    <rect width="250" height="150" rx="18" fill="#fff" stroke="#dedfec"/>
    <rect x="18" y="20" width="52" height="52" rx="14" fill="url(#accent)"/>
    <text x="44" y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="22" font-weight="800" fill="#fff">R</text>
    <text x="18" y="95" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" fill="#191827">README</text>
    <text x="18" y="123" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#626475">Quick start, screenshots, status, metadata</text>
  </g>

  <g transform="translate(380 252)">
    <rect width="250" height="150" rx="18" fill="#fff" stroke="#dedfec"/>
    <rect x="18" y="20" width="52" height="52" rx="14" fill="#dcfce7"/>
    <text x="44" y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="22" font-weight="800" fill="#15803d">F</text>
    <text x="18" y="95" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" fill="#191827">FAQ</text>
    <text x="18" y="123" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#626475">Privacy, sync, AI, upgrades, server use</text>
  </g>

  <g transform="translate(664 252)">
    <rect width="250" height="150" rx="18" fill="#fff" stroke="#dedfec"/>
    <rect x="18" y="20" width="52" height="52" rx="14" fill="#fef3c7"/>
    <text x="44" y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="22" font-weight="800" fill="#b45309">S</text>
    <text x="18" y="95" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" fill="#191827">Security</text>
    <text x="18" y="123" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#626475">Loopback posture and reporting channel</text>
  </g>

  <g transform="translate(948 252)">
    <rect width="250" height="150" rx="18" fill="#fff" stroke="#dedfec"/>
    <rect x="18" y="20" width="52" height="52" rx="14" fill="#dbeafe"/>
    <text x="44" y="55" text-anchor="middle" font-family="ui-monospace, monospace" font-size="22" font-weight="800" fill="#0f7fbf">C</text>
    <text x="18" y="95" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" fill="#191827">Contributing</text>
    <text x="18" y="123" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#626475">Setup, tests, docs, and task hygiene</text>
  </g>

  <path d="M346 327H380" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <path d="M630 327H664" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <path d="M914 327H948" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(96 456)">
    <rect width="1096" height="68" rx="18" fill="#111827"/>
    <text x="28" y="43" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800" fill="#fff">Verification target:</text>
    <text x="202" y="43" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#d1d5db">markdown link audit, docs consistency, task-board links, and public release blocker language</text>
  </g>
</svg>
