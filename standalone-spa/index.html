<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grimoire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════
   G R I M O I R E   —   Impeccable Redesign v3
   ══════════════════════════════════════════════════ */

/* --- Reset & Variables --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
  --font-mono: 'DM Mono', 'SF Mono', monospace;
  --font-pixel: 'Press Start 2P', monospace;
  --font-retro: 'VT323', monospace;

  /* Light theme — Tasklands warm fantasy palette */
  --cream: #f6ecd4;
  --cream-2: #efe1c0;
  --ink: #2b2230;
  --ink-soft: #4a3f52;
  --stone: #756781;
  --forest: #2e7d4f;
  --forest-dark: #1f5c39;
  --sky: #9cd3ea;
  --royal: #3a5bd9;
  --gold: #f3ad1f;
  --gold-dark: #c9810f;
  --danger: #c0392b;
  --success: #2e7d4f;

  --bg: var(--cream);
  --surface: #fffdf7;
  --surface-raised: #fffdf7;
  --border: var(--ink);
  --border-light: var(--ink-soft);
  --text-primary: var(--ink);
  --text-secondary: var(--ink-soft);
  --text-tertiary: var(--stone);
  --accent: var(--gold);
  --accent-soft: #fff3d0;
  --accent-border: var(--gold-dark);
  --tag-bg: var(--cream-2);
  --tag-text: var(--ink-soft);
  --hover-bg: var(--cream-2);
  --star: var(--gold);
  --overlay: rgba(43, 34, 48, 0.6);

  --shadow-hard: 5px 5px 0 var(--ink);
  --shadow-hard-sm: 3px 3px 0 var(--ink);
  --shadow-sm: 5px 5px 0 var(--ink);
  --shadow-md: 5px 5px 0 var(--ink);
  --border-width: 3px;
  --radius-sm: 0px;
  --radius-md: 0px;
  --radius-lg: 0px;

  /* Layout */
  --header-h: 56px;
  --search-h: 52px;
}

[data-theme="dark"] {
  --cream: #211b27;
  --cream-2: #2a2331;
  --ink: #f1e9da;
  --ink-soft: #cfc4d6;
  --stone: #9a8ca6;
  --forest: #1f5c39;
  --forest-dark: #0f2d1b;
  --sky: #1c3a4a;
  --royal: #283a8f;
  --gold: #f3ad1f;
  --gold-dark: #c9810f;
  --danger: #e74c3c;
  --success: #2ecc71;

  --bg: var(--cream);
  --surface: #2f2738;
  --surface-raised: #3a3045;
  --border: #5a4d63;
  --border-light: #5a4d63;
  --text-primary: var(--ink);
  --text-secondary: var(--ink-soft);
  --text-tertiary: var(--stone);
  --accent: var(--gold);
  --accent-soft: #3a2a10;
  --accent-border: var(--gold-dark);
  --tag-bg: #3a3045;
  --tag-text: var(--ink-soft);
  --hover-bg: #3a3045;
  --star: var(--gold);
  --overlay: rgba(0, 0, 0, 0.7);
  --shadow-sm: 4px 4px 0 #0d0a11;
  --shadow-md: 5px 5px 0 #0d0a11;
  --shadow-hard: 5px 5px 0 #0d0a11;
  --shadow-hard-sm: 3px 3px 0 #0d0a11;
}

html { font-size: 15px; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  background-image:
    linear-gradient(rgba(43, 34, 48, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(43, 34, 48, 0.05) 1px, transparent 1px);
  background-size: 24px 24px;
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding-top: calc(var(--header-h) + var(--search-h));
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* === HEADER: TWO-ROW STICKY === */
.app-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--surface);
  border-bottom: var(--border-width) solid var(--border);
  box-shadow: var(--shadow-hard-sm);
}
.header-top {
  height: var(--header-h);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-top h1 {
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-top h1 span { color: var(--text-tertiary); font-weight: 400; }
.header-actions { display: flex; align-items: center; gap: 8px; }

.header-search-row {
  height: var(--search-h);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-top: 1px solid var(--border-light);
  background: var(--surface-raised);
}

.search-box { flex: 1; min-width: 0; position: relative; }
.search-box input {
  width: 100%;
  padding: 8px 12px 8px 34px;
  border: var(--border-width) solid var(--border);
  background: var(--bg);
  background-image:
    linear-gradient(rgba(43, 34, 48, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(43, 34, 48, 0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 500;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-box input:focus { border-color: var(--accent-border); box-shadow: 0 0 0 2px var(--accent-soft); }
.search-box .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-tertiary); font-size: 0.9rem; pointer-events: none;
}

.header-btn {
  height: 34px; min-width: 34px;
  border: var(--border-width) solid var(--border);
  background: var(--surface); color: var(--text-secondary);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; transition: all 0.12s ease; gap: 5px;
  padding: 0 8px; white-space: nowrap; font-family: var(--font-sans); font-weight: 500;
}
.header-btn:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
.header-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
.header-btn .label { display: none; }
@media (min-width: 769px) { .header-btn .label { display: inline; } }
.categories-btn { color: var(--forest); }
.categories-btn .count { font-family: var(--font-mono); font-size: 0.7rem; opacity: 0.7; }

.view-toggle { display: flex; border: var(--border-width) solid var(--border); overflow: hidden; flex-shrink: 0; }
.view-toggle button { padding: 5px 10px; background: var(--surface); border: none; color: var(--text-tertiary); cursor: pointer; font-size: 0.85rem; transition: all 0.12s; }
.view-toggle button.active { background: var(--accent-soft); color: var(--accent); }
.view-toggle button:not(:last-child) { border-right: var(--border-width) solid var(--border); }

/* === LAYOUT === */
.main-layout { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - var(--header-h) - var(--search-h)); }

/* === SIDEBAR === */
.sidebar {
  width: 240px; flex-shrink: 0; padding: 20px 16px;
  border-right: var(--border-width) solid var(--border);
  display: flex; flex-direction: column; gap: 20px;
  position: sticky; top: calc(var(--header-h) + var(--search-h));
  align-self: flex-start;
  max-height: calc(100vh - var(--header-h) - var(--search-h));
  overflow-y: auto;
}
.sidebar-section h3 { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); margin-bottom: 8px; padding: 0 8px; font-family: var(--font-pixel); }
.category-list { display: flex; flex-direction: column; gap: 2px; }
.category-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 8px;
  cursor: pointer; font-size: 0.82rem; color: var(--text-secondary);
  transition: all 0.12s ease; border: 2px solid transparent;
}
.category-item:hover { background: var(--hover-bg); border-color: var(--border-light); }
.category-item.active { border-color: var(--accent-border); background: var(--accent-soft); color: var(--accent); font-weight: 500; }
.category-item .color-dot { width: 8px; height: 8px; flex-shrink: 0; }
.category-item .count { margin-left: auto; font-size: 0.7rem; color: var(--text-tertiary); font-family: var(--font-mono); }

.collections-list { display: flex; flex-direction: column; gap: 2px; }
.collection-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  cursor: pointer; font-size: 0.8rem; color: var(--text-secondary);
  transition: all 0.12s; border: 2px solid transparent;
}
.collection-item:hover { background: var(--hover-bg); }
.collection-item .icon { font-size: 0.85rem; }
.collection-item .count { margin-left: auto; font-size: 0.7rem; color: var(--text-tertiary); font-family: var(--font-mono); }
.collection-item .delete-btn { opacity: 0; font-size: 0.7rem; cursor: pointer; color: var(--danger); background: none; border: none; padding: 2px; transition: opacity 0.12s; }
.collection-item:hover .delete-btn { opacity: 1; }
.save-collection-btn { padding: 6px 8px; font-size: 0.78rem; color: var(--forest); cursor: pointer; background: none; border: 2px dashed var(--border-light); font-family: var(--font-sans); transition: all 0.12s; text-align: left; margin-top: 4px; }
.save-collection-btn:hover { border-color: var(--forest); background: var(--accent-soft); }

/* === MAIN CONTENT === */
.content { flex: 1; padding: 16px 24px 80px; min-width: 0; }

.stats-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 0; margin-bottom: 12px;
  border-bottom: 1px solid var(--border-light);
  font-size: 0.78rem; color: var(--text-secondary); flex-wrap: wrap;
}
.stats-bar strong { color: var(--text-primary); font-weight: 600; }
.stats-bar .divider { color: var(--border); }

/* ═══ REPORTS — Always Visible Section ═══ */
.reports-section {
  border: var(--border-width) solid var(--border);
  margin-bottom: 16px;
  background: var(--surface);
  box-shadow: var(--shadow-hard-sm);
}

.reports-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-light);
  user-select: none;
}
.reports-header:hover { background: var(--hover-bg); }
.reports-header-left { display: flex; align-items: center; gap: 10px; }
.reports-header-left h3 {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-tertiary); font-family: var(--font-pixel);
}
.reports-header-left .reports-icon { font-size: 1rem; }
.reports-header .reports-indicator {
  font-size: 0.68rem; color: var(--text-tertiary);
  font-family: var(--font-mono);
}
.reports-toggle-icon { font-size: 0.75rem; color: var(--text-tertiary); transition: transform 0.2s; }
.reports-section.collapsed .reports-toggle-icon { transform: rotate(-90deg); }
.reports-section.collapsed .reports-body { display: none; }

.reports-body { padding: 14px 16px 16px; max-height: 420px; overflow-y: auto; }
.reports-section.collapsed .reports-body { max-height: 0; overflow: hidden; }

/* --- Metrics row (4 stat cards) --- */
.reports-metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
@media (max-width: 680px) { .reports-metrics { grid-template-columns: repeat(2, 1fr); } }

.metric-card {
  border: 2px solid var(--border);
  padding: 10px 12px;
  text-align: center;
  background: var(--surface-raised);
}
.metric-card .metric-value {
  font-size: 1.3rem;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--text-primary);
  line-height: 1.2;
}
.metric-card .metric-label {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-tertiary);
  font-family: var(--font-pixel);
  margin-top: 4px;
}
.metric-card.metric-highlight { border-color: var(--gold); }
.metric-card.metric-highlight .metric-value { color: var(--gold-dark); }

/* --- Chart grid --- */
.reports-charts {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 12px;
}
@media (max-width: 900px) { .reports-charts { grid-template-columns: 1fr; } }

.chart-card {
  border: 2px solid var(--border);
  padding: 12px;
  background: var(--surface-raised);
  position: relative;
}
.chart-card h4 {
  font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-tertiary);
  margin-bottom: 8px; font-family: var(--font-pixel);
}
.chart-card canvas { width: 100% !important; height: 180px !important; }
.chart-card .chart-hint {
  font-size: 0.6rem; color: var(--text-tertiary);
  text-align: center; font-family: var(--font-mono);
  margin-top: 6px; opacity: 0.7;
}

/* --- Insights bar --- */
.reports-insights {
  border: 2px dashed var(--border-light);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 0.78rem;
  color: var(--text-secondary);
  background: var(--surface-raised);
}
.reports-insights .insights-icon { font-size: 0.9rem; flex-shrink: 0; }
.insight-item {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 8px;
  border: 1px solid var(--border-light);
  background: var(--surface);
  cursor: default;
}
.insight-item .insight-label { color: var(--text-tertiary); font-size: 0.68rem; }
.insight-item .insight-value { font-weight: 600; color: var(--text-primary); font-size: 0.78rem; }
.insight-item.clickable { cursor: pointer; }
.insight-item.clickable:hover { border-color: var(--accent); background: var(--accent-soft); }

/* --- Active chart filter indicator --- */
.chart-filter-bar {
  display: none;
  align-items: center; gap: 8px;
  padding: 8px 14px;
  background: var(--accent-soft);
  border: 2px solid var(--gold);
  margin-bottom: 10px;
  font-size: 0.78rem;
}
.chart-filter-bar.visible { display: flex; }
.chart-filter-bar .filter-label { color: var(--text-secondary); }
.chart-filter-bar .filter-value { font-weight: 600; color: var(--accent); }
.chart-filter-clear {
  margin-left: auto;
  padding: 4px 10px;
  border: 2px solid var(--gold-dark);
  background: var(--surface);
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.12s;
}
.chart-filter-clear:hover { background: var(--accent-soft); }

/* --- Bookmark Grid --- */
.bookmarks-grid { display: grid; gap: 12px; }
.bookmarks-grid.grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
.bookmarks-grid.list { grid-template-columns: 1fr; }

.bookmark-card {
  background: var(--surface); border: var(--border-width) solid var(--border);
  overflow: hidden; transition: all 0.15s ease;
  cursor: pointer; position: relative;
}
.bookmark-card:hover { border-color: var(--accent-border); transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }
.bookmark-card:active { transform: translate(1px, 1px); box-shadow: 2px 2px 0 var(--ink); }
.bookmark-card .color-bar { height: 3px; width: 100%; }
.bookmark-card .card-thumb { width: 100%; height: 160px; object-fit: cover; background: var(--border-light); display: block; }
.bookmark-card .card-thumb-placeholder { width: 100%; height: 160px; background: var(--border-light); display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 0.75rem; }
.bookmark-card .card-body { padding: 12px; }
.bookmark-card .card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.bookmark-card .card-category { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border: 1px solid; font-family: var(--font-pixel); }
.bookmark-card .card-domain { font-size: 0.7rem; color: var(--text-tertiary); }
.bookmark-card .card-title { font-size: 0.88rem; font-weight: 600; line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.bookmark-card .card-desc { font-size: 0.78rem; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
.bookmark-card .card-tags { display: flex; flex-wrap: wrap; gap: 3px; }

.tag { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; background: var(--tag-bg); color: var(--tag-text); font-size: 0.68rem; font-weight: 500; white-space: nowrap; border: 1px solid var(--border-light); }

/* --- List View --- */
.bookmark-row { display: flex; align-items: flex-start; gap: 14px; padding: 11px 14px; background: var(--surface); border: var(--border-width) solid var(--border); cursor: pointer; transition: all 0.12s; }
.bookmark-row:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
.bookmark-row .row-icon { width: 20px; height: 20px; flex-shrink: 0; background: var(--border-light); }
.bookmark-row .row-content { flex: 1; min-width: 0; }
.bookmark-row .row-title { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bookmark-row .row-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; font-size: 0.72rem; color: var(--text-tertiary); flex-wrap: wrap; }

/* === CATEGORIES DRAWER === */
.categories-drawer-overlay { position: fixed; inset: 0; background: var(--overlay); z-index: 200; opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; }
.categories-drawer-overlay.open { opacity: 1; visibility: visible; }
.categories-drawer { position: fixed; left: 0; bottom: 0; right: 0; max-height: 80vh; background: var(--surface); border-top: var(--border-width) solid var(--border); box-shadow: 0 -5px 0 var(--ink); z-index: 201; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; }
.categories-drawer.open { transform: translateY(0); }
.drawer-handle { width: 40px; height: 4px; background: var(--border-light); border-radius: 2px; margin: 10px auto; }
.drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px 12px; border-bottom: 1px solid var(--border-light); }
.drawer-header h3 { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); font-family: var(--font-pixel); }
.drawer-close { width: 30px; height: 30px; border: var(--border-width) solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: var(--text-secondary); }
.drawer-category-list { padding: 8px 20px 24px; display: flex; flex-direction: column; gap: 2px; }

/* === QUICK PEEK MODAL === */
.quick-peek-overlay { position: fixed; inset: 0; background: var(--overlay); z-index: 300; opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; display: flex; align-items: center; justify-content: center; padding: 20px; }
.quick-peek-overlay.open { opacity: 1; visibility: visible; }
.quick-peek { background: var(--surface); border: var(--border-width) solid var(--border); box-shadow: 8px 8px 0 var(--ink); max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; transform: scale(0.95) translateY(10px); transition: transform 0.2s ease; }
.quick-peek-overlay.open .quick-peek { transform: scale(1) translateY(0); }
.peek-header { position: relative; }
.peek-thumb { width: 100%; height: 200px; object-fit: cover; background: var(--border-light); display: block; }
.peek-thumb-placeholder { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 0.85rem; background: var(--border-light); }
.peek-close { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border: var(--border-width) solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--text-secondary); box-shadow: 2px 2px 0 var(--ink); }
.peek-body { padding: 20px; }
.peek-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.peek-category { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 8px; border: 1px solid; font-family: var(--font-pixel); }
.peek-domain { font-size: 0.75rem; color: var(--text-tertiary); font-family: var(--font-mono); }
.peek-source { font-size: 0.7rem; color: var(--text-tertiary); }
.peek-importance { font-size: 0.75rem; color: var(--gold); }
.peek-title { font-size: 1.1rem; font-weight: 700; line-height: 1.4; margin-bottom: 10px; }
.peek-desc { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; }
.peek-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
.peek-actions { display: flex; gap: 10px; }
.peek-open-btn { flex: 1; padding: 10px 20px; background: var(--accent); border: var(--border-width) solid var(--accent-border); color: white; font-family: var(--font-sans); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.12s; text-align: center; }
.peek-open-btn:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
.peek-open-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
.peek-date { font-size: 0.72rem; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-light); }

/* === RANDOM BOOKMARK === */
.random-highlight { position: fixed; top: calc(var(--header-h) + var(--search-h) + 10px); right: 20px; z-index: 90; background: var(--surface); border: var(--border-width) solid var(--gold); box-shadow: 5px 5px 0 var(--ink); padding: 14px 18px; max-width: 360px; animation: slideInRight 0.3s ease; display: none; }
.random-highlight.visible { display: block; }
.random-highlight .rh-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; cursor: pointer; }
.random-highlight .rh-title:hover { color: var(--accent); }
.random-highlight .rh-meta { font-size: 0.7rem; color: var(--text-tertiary); font-family: var(--font-mono); }
.random-highlight .rh-dismiss { position: absolute; top: 6px; right: 8px; cursor: pointer; font-size: 0.7rem; color: var(--text-tertiary); background: none; border: none; font-family: var(--font-sans); }
.random-highlight .rh-dismiss:hover { color: var(--danger); }
@keyframes slideInRight { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* === MOBILE BOTTOM BAR === */
.mobile-bottom-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 99; height: 52px; background: var(--surface); border-top: var(--border-width) solid var(--border); box-shadow: 0 -3px 0 var(--ink); align-items: center; justify-content: space-around; padding: 0 8px; }
.mobile-bottom-bar .mb-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: var(--text-tertiary); font-size: 1.1rem; cursor: pointer; padding: 6px 12px; transition: color 0.12s; font-family: var(--font-sans); }
.mobile-bottom-bar .mb-btn span { font-size: 0.55rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.mobile-bottom-bar .mb-btn.active { color: var(--accent); }
.mobile-bottom-bar .mb-btn:active { opacity: 0.6; }

/* === PAGINATION === */
.pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 24px 0; flex-wrap: wrap; }
.pagination button { min-width: 34px; height: 34px; border: var(--border-width) solid var(--border); background: var(--surface); color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.8rem; cursor: pointer; transition: all 0.12s; display: flex; align-items: center; justify-content: center; }
.pagination button:hover { border-color: var(--accent); color: var(--accent); }
.pagination button.active { background: var(--accent); color: white; border-color: var(--accent-border); }
.pagination button:disabled { opacity: 0.3; cursor: default; }
.pagination .page-ellipsis { color: var(--text-tertiary); font-family: var(--font-mono); font-size: 0.75rem; padding: 0 2px; }
.pagination .per-page { margin-left: 16px; display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text-tertiary); }
.pagination .per-page select { padding: 4px 8px; border: var(--border-width) solid var(--border); background: var(--surface); color: var(--text-primary); font-size: 0.78rem; font-family: var(--font-sans); cursor: pointer; }

/* === LOGIN PAGE === */
.login-page { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); background-image: linear-gradient(rgba(43, 34, 48, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(43, 34, 48, 0.05) 1px, transparent 1px); background-size: 24px 24px; }
.login-card { width: 360px; padding: 40px; background: var(--surface); border: var(--border-width) solid var(--border); box-shadow: var(--shadow-md); }
.login-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.02em; }
.login-card .subtitle { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 28px; }
.login-card label { display: block; font-size: 0.78rem; font-weight: 500; margin-bottom: 4px; color: var(--text-secondary); }
.login-card input { width: 100%; padding: 10px 14px; border: var(--border-width) solid var(--border); background: var(--bg); background-image: linear-gradient(rgba(43, 34, 48, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(43, 34, 48, 0.05) 1px, transparent 1px); background-size: 24px 24px; color: var(--text-primary); font-family: var(--font-sans); font-size: 0.9rem; outline: none; margin-bottom: 16px; transition: border-color 0.15s; }
.login-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.btn-primary { width: 100%; padding: 10px 20px; background: var(--accent); color: white; border: var(--border-width) solid var(--accent-border); font-family: var(--font-sans); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.12s; }
.btn-primary:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
.btn-primary:active { transform: translate(1px, 1px); box-shadow: none; }
.login-error { color: var(--danger); font-size: 0.8rem; margin-top: 12px; display: none; }

.loading { display: flex; align-items: center; justify-content: center; padding: 80px 0; color: var(--text-tertiary); }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 80px 20px; color: var(--text-tertiary); }
.empty-state h3 { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 4px; }
.empty-state p { font-size: 0.85rem; }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  body { padding-top: calc(var(--header-h) + var(--search-h) + 4px); }
  .sidebar { display: none; }
  .content { padding: 12px 10px 70px; }
  .bookmarks-grid.grid { grid-template-columns: 1fr; }
  .header-top { padding: 0 12px; }
  .header-search-row { padding: 0 12px; gap: 8px; }
  .app-header h1 { font-size: 0.95rem; }
  .header-btn { min-width: 32px; height: 32px; padding: 0 6px; font-size: 0.8rem; }
  .stats-bar { font-size: 0.72rem; gap: 8px; }
  .mobile-bottom-bar { display: flex; }
  .categories-drawer { max-height: 85vh; }
  .drawer-category-list { padding: 8px 16px 20px; }
  .quick-peek { max-width: 100%; margin: 10px; max-height: 90vh; }
  .peek-thumb { height: 160px; }
  .peek-body { padding: 16px; }
  .random-highlight { left: 12px; right: 12px; max-width: none; top: calc(var(--header-h) + var(--search-h) + 8px); }
  .reports-header { padding: 8px 12px; }
  .reports-body { padding: 10px 12px 12px; }
}
@media (max-width: 480px) {
  .header-top h1 span { display: none; }
  .view-toggle button { padding: 5px 8px; }
  .search-box input { font-size: 0.82rem; padding: 7px 10px 7px 30px; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); }
::-webkit-scrollbar-thumb:hover { background: var(--stone); }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
// ══════════════════════════════════════════════════
// G R I M O I R E   S P A   v3  —  Reports Everywhere
// ══════════════════════════════════════════════════

const API = { login: '/api/auth', bookmarks: '/api/bookmarks', categories: '/api/categories', tags: '/api/tags', health: '/api/health' };
const LIMIT_OPTIONS = [20, 50, 100];
const CAT_COLORS = ["#2563eb","#059669","#7c3aed","#d946ef","#dc2626","#f59e0b","#ec4899","#0891b2","#4f46e5","#0d9488","#a16207","#16a34a","#ca8a04"];
const COLLECTIONS_KEY = 'grimoire-collections';

let state = {
  authenticated: false, bookmarks: [], categories: [], total: 0,
  page: 1, limit: 100, view: 'grid', filter: '', category: null,
  theme: localStorage.getItem('grimoire-theme') || 'light',
  loading: true, cacheAge: 0,
  reportsOpen: false,
  chartFilter: null, // { type: 'category'|'domain'|'date', value: ... }
};

// ---- Render ----
function render() {
  const app = document.getElementById('app');
  if (!state.authenticated) { app.innerHTML = renderLogin(); bindLogin(); }
  else { app.innerHTML = renderApp(); bindApp(); }
}

// ---- Login ----
function renderLogin() {
  return `<div class="login-page"><div class="login-card"><h1>Grimoire</h1><p class="subtitle">Sign in to your bookmark library</p><form id="login-form"><label for="login-user">Username or email</label><input type="text" id="login-user" autocomplete="username" required><label for="login-pass">Password</label><input type="password" id="login-pass" autocomplete="current-password" required><button type="submit" class="btn-primary">Sign in</button><div id="login-error" class="login-error"></div></form></div></div>`;
}

function bindLogin() {
  const form = document.getElementById('login-form');
  if (!form) return;
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const login = document.getElementById('login-user').value;
    const password = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    try {
      const resp = await fetch(API.login, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ login, password }), credentials: 'include' });
      const data = await resp.json();
      if (data.success) { state.authenticated = true; state.loading = true; render(); await loadData(); }
      else { errEl.textContent = data.error || 'Login failed'; errEl.style.display = 'block'; }
    } catch (e) { errEl.textContent = 'Connection error — server may be down'; errEl.style.display = 'block'; }
  });
}

// ---- App shell ----
function renderApp() {
  const cats = state.categories || [];
  const collections = getCollections();
  const cf = state.chartFilter;
  return `
    <header class="app-header">
      <div class="header-top">
        <h1>Grimoire <span>· bookmarks</span></h1>
        <div class="header-actions">
          <span style="font-size:0.68rem;color:var(--text-tertiary);font-family:var(--font-mono)" id="cache-indicator"></span>
          <button class="header-btn" id="random-btn" title="Random bookmark">🎲</button>
          <button class="header-btn" id="add-btn" title="Add bookmark">➕</button>
          <button class="header-btn" id="refresh-btn" title="Refresh bookmarks">⟳</button>
          <button class="header-btn" id="theme-btn" title="Toggle theme">${state.theme === 'light' ? '🌙' : '☀️'}</button>
        </div>
      </div>
      <div class="header-search-row">
        <div class="search-box">
          <span class="search-icon">⌕</span>
          <input type="text" id="search-input" placeholder="Search ${state.total} bookmarks..." value="${escapeHtml(state.filter)}" autocomplete="off" spellcheck="false">
        </div>
        <button class="header-btn categories-btn" id="categories-btn">
          <span>📂</span><span class="label">Categories</span><span class="count" id="cat-count">${cats.length}</span>
        </button>
        <div class="view-toggle" id="view-toggle">
          <button data-view="grid" class="${state.view === 'grid' ? 'active' : ''}">⊞</button>
          <button data-view="list" class="${state.view === 'list' ? 'active' : ''}">≡</button>
        </div>
      </div>
    </header>

    <div class="main-layout">
      <aside class="sidebar">
        <div class="sidebar-section">
          <h3>Categories</h3>
          <div class="category-list" id="category-list">
            <div class="category-item ${!state.category ? 'active' : ''}" data-cat=""><span>📚 All bookmarks</span><span class="count">...</span></div>
          </div>
        </div>
        <div class="sidebar-section">
          <h3>Collections</h3>
          <div class="collections-list" id="collections-list">
            ${collections.length === 0 ? '<div style="font-size:0.78rem;color:var(--text-tertiary);padding:4px 8px">Save a search as a collection</div>' : ''}
            ${collections.map(c => `<div class="collection-item" data-collection="${escapeHtml(c.name)}"><span class="icon">📌</span><span>${escapeHtml(c.name)}</span><span class="count">${c.filter || c.category ? '🔍' : ''}</span><button class="delete-btn" data-collection="${escapeHtml(c.name)}" title="Delete">✕</button></div>`).join('')}
          </div>
          <button class="save-collection-btn" id="save-collection-btn">+ Save current search as collection</button>
        </div>
      </aside>

      <main class="content">
        <div class="stats-bar">
          <strong id="result-total">${state.total}</strong> bookmarks
          ${state.category && cats.find(c => c.id === state.category) ? `<span class="divider">·</span> in <strong>${escapeHtml(cats.find(c => c.id === state.category).name)}</strong>` : ''}
          ${state.filter ? `<span class="divider">·</span> filter: <strong>${escapeHtml(state.filter)}</strong>` : ''}
          ${cf ? `<span class="divider">·</span> chart: <strong>${cf.type}: ${escapeHtml(String(cf.value))}</strong>` : ''}
          ${state.total > 0 ? `<span class="divider">·</span> page <strong>${state.page}</strong> of <strong>${Math.ceil(state.total / state.limit)}</strong>` : ''}
        </div>

        <!-- ═══ REPORTS — Always Visible ═══ -->
        <div class="reports-section ${state.reportsOpen ? '' : 'collapsed'}" id="reports-section">
          <div class="reports-header" id="reports-header">
            <div class="reports-header-left">
              <span class="reports-icon">📊</span>
              <h3>Reports</h3>
              <span class="reports-indicator" id="reports-indicator">${state.bookmarks.length} pts</span>
            </div>
            <span class="reports-toggle-icon">▼</span>
          </div>
          <div class="reports-body" id="reports-body">
            <!-- Metrics -->
            <div class="reports-metrics" id="reports-metrics">
              <div class="metric-card"><div class="metric-value" id="metric-total">-</div><div class="metric-label">Total</div></div>
              <div class="metric-card"><div class="metric-value" id="metric-cats">-</div><div class="metric-label">Categories</div></div>
              <div class="metric-card metric-highlight"><div class="metric-value" id="metric-topcat">-</div><div class="metric-label">Top Category</div></div>
              <div class="metric-card"><div class="metric-value" id="metric-domains">-</div><div class="metric-label">Domains</div></div>
            </div>

            <!-- Chart filter active indicator -->
            <div class="chart-filter-bar ${cf ? 'visible' : ''}" id="chart-filter-bar">
              <span class="filter-label">Chart filter:</span>
              <span class="filter-value" id="chart-filter-value">${cf ? `${cf.type}: ${cf.value}` : ''}</span>
              <button class="chart-filter-clear" id="chart-filter-clear">✕ Clear</button>
            </div>

            <!-- Charts -->
            <div class="reports-charts" id="reports-charts">
              <div class="chart-card"><h4>By Category</h4><canvas id="chart-categories"></canvas><div class="chart-hint">click a bar to filter</div></div>
              <div class="chart-card"><h4>Top Domains</h4><canvas id="chart-domains"></canvas><div class="chart-hint">click a slice to search</div></div>
              <div class="chart-card"><h4>Timeline</h4><canvas id="chart-timeline"></canvas><div class="chart-hint">click a point to filter date</div></div>
              <div class="chart-card"><h4>Import Sources</h4><canvas id="chart-sources"></canvas><div class="chart-hint">source breakdown</div></div>
            </div>

            <!-- Insights -->
            <div class="reports-insights" id="reports-insights">
              <span class="insights-icon">💡</span>
              <div id="insights-content" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">Loading insights…</div>
            </div>
          </div>
        </div>

        <div id="bookmarks-container">${state.loading ? '<div class="loading"><div class="spinner"></div></div>' : ''}</div>
        <div id="pagination-container"></div>
      </main>
    </div>

    <!-- Categories Drawer -->
    <div class="categories-drawer-overlay" id="cat-drawer-overlay"></div>
    <div class="categories-drawer" id="cat-drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header"><h3>Categories</h3><button class="drawer-close" id="drawer-close">✕</button></div>
      <div class="drawer-category-list" id="drawer-category-list"></div>
    </div>

    <!-- Quick Peek Modal -->
    <div class="quick-peek-overlay" id="peek-overlay">
      <div class="quick-peek" id="peek-modal">
        <div class="peek-header">
          <div class="peek-thumb-placeholder" id="peek-thumb-placeholder">No preview</div>
          <img class="peek-thumb" id="peek-thumb" style="display:none" alt="">
          <button class="peek-close" id="peek-close">✕</button>
        </div>
        <div class="peek-body">
          <div class="peek-meta"><span class="peek-category" id="peek-category"></span><span class="peek-domain" id="peek-domain"></span><span class="peek-importance" id="peek-importance"></span><span class="peek-source" id="peek-source"></span></div>
          <div class="peek-title" id="peek-title"></div>
          <div class="peek-desc" id="peek-desc"></div>
          <div class="peek-tags" id="peek-tags"></div>
          <div class="peek-actions"><button class="peek-open-btn" id="peek-open-btn">Open link →</button></div>
          <div class="peek-date" id="peek-date"></div>
        </div>
      </div>
    </div>

    <!-- Random highlight -->
    <div class="random-highlight" id="random-highlight">
      <button class="rh-dismiss" id="rh-dismiss">✕</button>
      <div class="rh-title" id="rh-title"></div>
      <div class="rh-meta" id="rh-meta"></div>
    </div>

    <!-- Mobile bottom bar -->
    <nav class="mobile-bottom-bar">
      <button class="mb-btn active" data-view="grid"><span>⊞</span><span>Grid</span></button>
      <button class="mb-btn" data-view="list"><span>≡</span><span>List</span></button>
      <button class="mb-btn" id="mb-categories"><span>📂</span><span>Cats</span></button>
      <button class="mb-btn" id="mb-random"><span>🎲</span><span>Random</span></button>
    </nav>
  `;
}

// ---- Bookmark Cards / Rows ----
function renderBookmarks() {
  const bm = state.bookmarks;
  const container = document.getElementById('bookmarks-container');
  if (!container) return;
  if (state.loading) { container.innerHTML = '<div class="loading"><div class="spinner"></div></div>'; return; }
  if (bm.length === 0) {
    container.innerHTML = `<div class="empty-state"><h3>No bookmarks found</h3><p>${state.filter || state.chartFilter ? 'Try a different search term or clear the filter.' : 'Your library is empty. Add some bookmarks!'}</p></div>`;
    return;
  }
  if (state.view === 'grid') container.innerHTML = `<div class="bookmarks-grid grid">${bm.map(b => renderCard(b)).join('')}</div>`;
  else container.innerHTML = `<div class="bookmarks-grid list">${bm.map(b => renderRow(b)).join('')}</div>`;

  container.querySelectorAll('.bookmark-card, .bookmark-row').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(el.dataset.id);
      const b = state.bookmarks.find(bk => bk.id === id);
      if (b) openQuickPeek(b);
    });
  });
}

function renderCard(b) {
  const cat = state.categories.find(c => c.id === b.categoryId);
  const catColor = cat?.color || '#999';
  const catName = cat?.name || 'Uncategorized';
  const thumbSrc = b.mainImageUrl || b.mainImage?.relativePath && `/files/${b.mainImageId}`;
  const domain = b.domain || (b.url ? new URL(b.url).hostname : '');
  const tags = b.tags || [];
  return `<div class="bookmark-card" data-id="${b.id}"><div class="color-bar" style="background:${catColor}"></div>${thumbSrc ? `<img class="card-thumb" src="${escapeHtml(thumbSrc)}" alt="" loading="lazy" onerror="this.style.display='none'">` : `<div class="card-thumb-placeholder">${escapeHtml(domain)}</div>`}<div class="card-body"><div class="card-meta"><span class="card-category" style="border-color:${catColor};color:${catColor}">${escapeHtml(catName)}</span><span class="card-domain">${escapeHtml(domain)}</span></div><div class="card-title">${escapeHtml(b.title)}</div>${b.description ? `<div class="card-desc">${escapeHtml(b.description)}</div>` : ''}${tags.length > 0 ? `<div class="card-tags">${tags.slice(0, 4).map(t => `<span class="tag">#${escapeHtml(t.name || t)}</span>`).join('')}${tags.length > 4 ? `<span class="tag">+${tags.length - 4}</span>` : ''}</div>` : ''}</div></div>`;
}

function renderRow(b) {
  const cat = state.categories.find(c => c.id === b.categoryId);
  const catColor = cat?.color || '#999';
  const catName = cat?.name || 'Uncategorized';
  const domain = b.domain || (b.url ? new URL(b.url).hostname : '');
  const tags = b.tags || [];
  const iconUrl = b.iconUrl || (b.iconId ? `/files/${b.iconId}` : null);
  return `<div class="bookmark-row" data-id="${b.id}">${iconUrl ? `<img class="row-icon" src="${escapeHtml(iconUrl)}" alt="" onerror="this.style.display='none'">` : `<div class="row-icon"></div>`}<div class="row-content"><div class="row-title">${escapeHtml(b.title)}</div><div class="row-meta"><span style="color:${catColor};font-weight:500">${escapeHtml(catName)}</span><span>·</span><span>${escapeHtml(domain)}</span><span>·</span><span>${b.importance ? '★'.repeat(b.importance) : ''}</span>${tags.length > 0 ? `<span>· ${tags.slice(0, 3).map(t => `#${escapeHtml(t.name || t)}`).join(' ')}${tags.length > 3 ? ` +${tags.length - 3}` : ''}</span>` : ''}</div></div></div>`;
}

// ---- Pagination ----
function renderPagination() {
  const container = document.getElementById('pagination-container');
  if (!container) return;
  const totalPages = Math.ceil(state.total / state.limit);
  if (totalPages <= 1) { container.innerHTML = ''; return; }
  const current = state.page;
  const range = 3;
  let pages = [1];
  let start = Math.max(2, current - range);
  let end = Math.min(totalPages - 1, current + range);
  if (current - range <= 2) end = Math.min(totalPages - 1, 2 + range * 2);
  if (current + range >= totalPages - 1) start = Math.max(2, totalPages - 1 - range * 2);
  if (start > 2) pages.push('…');
  for (let i = start; i <= end; i++) pages.push(i);
  if (end < totalPages - 1) pages.push('…');
  if (totalPages > 1) pages.push(totalPages);
  container.innerHTML = `<div class="pagination"><button class="page-prev" ${current <= 1 ? 'disabled' : ''}>‹</button>${pages.map(p => p === '…' ? '<span class="page-ellipsis">…</span>' : `<button class="${p === current ? 'active' : ''}" data-page="${p}">${p}</button>`).join('')}<button class="page-next" ${current >= totalPages ? 'disabled' : ''}>›</button><span class="per-page">Show <select id="per-page-select">${LIMIT_OPTIONS.map(o => `<option value="${o}" ${o === state.limit ? 'selected' : ''}>${o}</option>`).join('')}</select> per page</span></div>`;
  container.querySelectorAll('[data-page]').forEach(btn => { btn.addEventListener('click', () => { state.page = parseInt(btn.dataset.page); state.loading = true; renderBookmarks(); loadData(); window.scrollTo({ top: 0, behavior: 'smooth' }); }); });
  const prev = container.querySelector('.page-prev');
  const next = container.querySelector('.page-next');
  if (prev) prev.addEventListener('click', () => { if (state.page > 1) { state.page--; state.loading = true; renderBookmarks(); loadData(); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
  if (next) next.addEventListener('click', () => { if (state.page < totalPages) { state.page++; state.loading = true; renderBookmarks(); loadData(); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
  const perPage = container.querySelector('#per-page-select');
  if (perPage) perPage.addEventListener('change', () => { state.limit = parseInt(perPage.value); state.page = 1; state.loading = true; renderBookmarks(); loadData(); });
}

// ---- Client-side cache ----
const CACHE_KEY_BM = 'grimoire-bookmarks-cache';
const CACHE_KEY_CAT = 'grimoire-categories-cache';
const CACHE_TTL = 60 * 60 * 1000;

function loadFromCache() {
  try {
    const bmRaw = localStorage.getItem(CACHE_KEY_BM);
    const catRaw = localStorage.getItem(CACHE_KEY_CAT);
    if (bmRaw && catRaw) {
      const bmCache = JSON.parse(bmRaw);
      const catCache = JSON.parse(catRaw);
      const now = Date.now();
      if (now - bmCache.ts < CACHE_TTL && now - catCache.ts < CACHE_TTL) {
        state.bookmarks = bmCache.data;
        state.categories = catCache.data;
        state.total = bmCache.data.length;
        state.cacheAge = Math.floor((now - bmCache.ts) / 1000);
        updateCacheIndicator();
        return true;
      }
    }
  } catch (e) {}
  return false;
}

function saveToCache(bookmarks, categories) {
  try { localStorage.setItem(CACHE_KEY_BM, JSON.stringify({ ts: Date.now(), data: bookmarks })); localStorage.setItem(CACHE_KEY_CAT, JSON.stringify({ ts: Date.now(), data: categories })); }
  catch (e) { try { localStorage.removeItem(CACHE_KEY_BM); localStorage.removeItem(CACHE_KEY_CAT); } catch(_) {} }
}
function clearCache() { localStorage.removeItem(CACHE_KEY_BM); localStorage.removeItem(CACHE_KEY_CAT); }
function updateCacheIndicator() {
  const el = document.getElementById('cache-indicator');
  if (!el) return;
  el.textContent = state.cacheAge > 0 ? (state.cacheAge < 60 ? state.cacheAge + 's' : Math.floor(state.cacheAge/60) + 'm') : '';
}

// ---- Collections ----
function getCollections() { try { return JSON.parse(localStorage.getItem(COLLECTIONS_KEY)) || []; } catch { return []; } }
function saveCollections(cols) { localStorage.setItem(COLLECTIONS_KEY, JSON.stringify(cols)); }
function saveCurrentAsCollection() {

function applyCollection(col) {

function deleteCollection(name) { let cols = getCollections(); cols = cols.filter(c => c.name !== name); saveCollections(cols); updateCollectionsList(); }

// ---- Data loading ----
async function loadData(forceRefresh) {
  if (!forceRefresh && state.filter === '' && !state.category && !state.chartFilter && loadFromCache()) {
    state.loading = false;
    const tc = document.getElementById('total-count'); if (tc) tc.textContent = state.total;
    document.getElementById('result-total').textContent = state.total;
    renderBookmarks();
    renderPagination();
    updateCategoryList();
    renderReports();
    refreshInBackground();
    return;
  }
  try {
    const params = new URLSearchParams();
    params.set('page', state.page);
    params.set('limit', state.limit);
    if (state.filter) params.set('filter', state.filter);
    const url = `${API.bookmarks}?${params}`;
    const [bmResp, catResp] = await Promise.all([fetch(url, { credentials: 'include' }), fetch(API.categories, { credentials: 'include' })]);
    if (!bmResp.ok || !catResp.ok) { if (bmResp.status === 401 || catResp.status === 401) { state.authenticated = false; render(); return; } throw new Error(`HTTP ${bmResp.status}`); }
    const bmData = await bmResp.json();
    const catData = await catResp.json();
    state.bookmarks = bmData.bookmarks || bmData;
    state.categories = catData.categories || catData;
    state.total = bmData.total !== undefined ? bmData.total : (bmData.bookmarks ? bmData.bookmarks.length : state.bookmarks.length);
    state.loading = false;
    state.cacheAge = 0;
    if (!state.filter && !state.category) saveToCache(state.bookmarks, state.categories);
    updateCacheIndicator();
    const tc = document.getElementById('total-count'); if (tc) tc.textContent = state.total;
    document.getElementById('result-total').textContent = state.total;
    renderBookmarks();
    renderPagination();
    updateCategoryList();
    renderReports();
  } catch (e) { console.error('Load error:', e); state.loading = false; renderBookmarks(); }
}

let _refreshing = false;
async function refreshInBackground() {
  if (_refreshing) return;
  _refreshing = true;
  try {
    const [bmResp, catResp] = await Promise.all([fetch(API.bookmarks, { credentials: 'include' }), fetch(API.categories, { credentials: 'include' })]);
    if (!bmResp.ok || !catResp.ok) return;
    const bmData = await bmResp.json();
    const catData = await catResp.json();
    const bookmarks = bmData.bookmarks || bmData;
    const categories = catData.categories || catData;
    state.bookmarks = bookmarks;
    state.categories = categories;
    state.total = bookmarks.length;
    state.cacheAge = 0;
    saveToCache(bookmarks, categories);
    updateCacheIndicator();
    const tc = document.getElementById('total-count'); if (tc) tc.textContent = state.total;
    document.getElementById('result-total').textContent = state.total;
    renderBookmarks();
    renderPagination();
    updateCategoryList();
    renderReports();
  } finally { _refreshing = false; }
}

// ---- Category list ----
function updateCategoryList() {
  const cats = state.categories || [];
  const bms = state.bookmarks || [];
  const list = document.getElementById('category-list');
  const drawerList = document.getElementById('drawer-category-list');
  const counts = {};
  cats.forEach(c => { counts[c.id] = 0; });
  bms.forEach(b => { const cid = b.categoryId; if (cid !== undefined) counts[cid] = (counts[cid] || 0) + 1; });
  const totalCount = bms.length;
  const buildHtml = (isDrawer) => {
    return `<div class="category-item ${!state.category ? 'active' : ''}" data-cat=""><span>${isDrawer ? '📚 ' : ''}All bookmarks</span><span class="count">${totalCount}</span></div>${cats.map(c => `<div class="category-item ${state.category === c.id ? 'active' : ''}" data-cat="${c.id}"><span class="color-dot" style="background:${c.color || '#999'}"></span><span>${escapeHtml(c.name)}</span><span class="count">${counts[c.id] || 0}</span></div>`).join('')}`;
  };
  if (list) list.innerHTML = buildHtml(false);
  if (drawerList) drawerList.innerHTML = buildHtml(true);
  const bindList = (container) => {
    if (!container) return;
    container.querySelectorAll('.category-item').forEach(el => {
      el.addEventListener('click', () => {
        state.category = el.dataset.cat ? parseInt(el.dataset.cat) : null;
        state.page = 1;
        state.loading = true;
        document.querySelectorAll('#category-list .category-item, #drawer-category-list .category-item').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        renderBookmarks();
        loadData();
        closeCategoriesDrawer();
      });
    });
  };
  bindList(list);
  bindList(drawerList);
}

// ═══ REPORTS — Always Visible, Interactive Charts ═══
// Lazy-load Chart.js from CDN
let _chartJsLoading = false;
let _chartJsCallbacks = [];
function _ensureChartJs(cb) {
  if (window.Chart) { cb(); return; }
  _chartJsCallbacks.push(cb);
  if (_chartJsLoading) return;
  _chartJsLoading = true;
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js';
  s.onload = () => { _chartJsLoading = false; const cbs = _chartJsCallbacks.slice(); _chartJsCallbacks = []; cbs.forEach(f => f()); };
  s.onerror = () => { _chartJsLoading = false; _chartJsCallbacks = []; console.error('Failed to load Chart.js'); };
  document.head.appendChild(s);
}

let _reportsCharts = [];

function renderReports() {
  const section = document.getElementById('reports-section');
  if (!section || section.classList.contains('collapsed')) return;

  // Lazy-load Chart.js if not yet loaded
  _ensureChartJs(() => renderReportsCharts(section));
}

function renderReportsCharts(section) {
  const ind = document.getElementById('reports-indicator');
  if (ind) ind.textContent = `${state.bookmarks.length} pts`;

  // Update metrics
  updateMetrics();

  // Update chart filter bar
  updateChartFilterBar();

  // Destroy old charts
  _reportsCharts.forEach(c => c.destroy());
  _reportsCharts = [];

  const bms = state.bookmarks;
  const cats = state.categories;
  if (!bms || !bms.length) return;

  // --- 1. Category Distribution (Horizontal Bar) ---
  const catCounts = {}; const catColors = {};
  cats.forEach(c => { catCounts[c.name] = 0; catColors[c.name] = c.color || '#999'; });
  catCounts['Uncategorized'] = 0; catColors['Uncategorized'] = '#999';
  bms.forEach(b => { const c = cats.find(cat => cat.id === b.categoryId); const name = c ? c.name : 'Uncategorized'; catCounts[name] = (catCounts[name] || 0) + 1; });
  const catLabels = Object.keys(catCounts).filter(k => catCounts[k] > 0).sort((a,b) => catCounts[b] - catCounts[a]);
  const catData = catLabels.map(k => catCounts[k]);
  const catColorArr = catLabels.map(k => catColors[k] || CAT_COLORS[catLabels.indexOf(k) % CAT_COLORS.length]);
  const catTotals = {labels: catLabels, data: catData};

  const catCtx = document.getElementById('chart-categories');
  if (catCtx) {
    _reportsCharts.push(new Chart(catCtx, {
      type: 'bar',
      data: { labels: catLabels, datasets: [{ data: catData, backgroundColor: catColorArr, borderColor: catColorArr.map(c => c), borderWidth: 1, borderRadius: 0 }] },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        animation: { duration: 600, easing: 'easeOutQuart' },
        onClick: (e, el) => { if (el.length > 0) { const label = catLabels[el[0].datasetIndex !== undefined ? el[0].index : 0]; applyChartFilter('category', label); } },
        plugins: { legend: { display: false }, tooltip: { backgroundColor: 'var(--surface)', borderColor: 'var(--border)', borderWidth: 2, titleFont: { family: "'DM Sans'" }, bodyFont: { family: "'DM Sans'" }, callbacks: { label: (ctx) => `${ctx.parsed.x} bookmarks` } } },
        scales: { x: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { font: { size: 10, family: "'DM Mono'" } } }, y: { grid: { display: false }, ticks: { font: { size: 9, family: "'DM Sans'" } } } }
      }
    }));
  }

  // --- 2. Top Domains (Doughnut) ---
  const domainCounts = {};
  bms.forEach(b => { const d = b.domain || 'unknown'; domainCounts[d] = (domainCounts[d] || 0) + 1; });
  const topDomains = Object.entries(domainCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const domLabels = topDomains.map(d => d[0].replace('www.', ''));
  const domData = topDomains.map(d => d[1]);
  const domColors = domLabels.map((_, i) => CAT_COLORS[i % CAT_COLORS.length]);

  const domCtx = document.getElementById('chart-domains');
  if (domCtx) {
    _reportsCharts.push(new Chart(domCtx, {
      type: 'doughnut',
      data: { labels: domLabels, datasets: [{ data: domData, backgroundColor: domColors, borderColor: 'var(--surface)', borderWidth: 2, hoverOffset: 8 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 600, easing: 'easeOutQuart' },
        onClick: (e, el) => { if (el.length > 0) { const label = domLabels[el[0].index]; applyChartFilter('domain', label); } },
        plugins: { legend: { position: 'right', labels: { font: { size: 9, family: "'DM Mono'" }, boxWidth: 10, padding: 8 } }, tooltip: { backgroundColor: 'var(--surface)', borderColor: 'var(--border)', borderWidth: 2, callbacks: { label: (ctx) => `${ctx.label}: ${ctx.parsed} bookmarks` } } },
        cutout: '45%'
      }
    }));
  }

  // --- 3. Timeline (Line) ---
  const dayCounts = {};
  bms.forEach(b => { if (b.created == null || b.created === 0) return; const d = new Date(Number(b.created) * 1000).toISOString().slice(0, 10); dayCounts[d] = (dayCounts[d] || 0) + 1; });
  const days = Object.keys(dayCounts).sort();
  const dayData = days.map(d => dayCounts[d]);
  const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--border-light').trim() || 'rgba(0,0,0,0.06)';

  const timeCtx = document.getElementById('chart-timeline');
  if (timeCtx && days.length) {
    _reportsCharts.push(new Chart(timeCtx, {
      type: 'line',
      data: { labels: days, datasets: [{ data: dayData, borderColor: '#3a5bd9', backgroundColor: 'rgba(58,91,217,0.08)', fill: true, tension: 0.35, pointRadius: 3, pointBackgroundColor: '#3a5bd9', pointHoverRadius: 6, pointBorderColor: 'var(--surface)', pointBorderWidth: 2 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 800, easing: 'easeOutQuart' },
        onClick: (e, el) => { if (el.length > 0) { const label = days[el[0].index]; applyChartFilter('date', label); } },
        plugins: { legend: { display: false }, tooltip: { backgroundColor: 'var(--surface)', borderColor: 'var(--border)', borderWidth: 2, callbacks: { label: (ctx) => `${ctx.parsed.y} bookmarks on ${ctx.label}` } } },
        scales: { y: { beginAtZero: true, grid: { color: gridColor }, ticks: { font: { size: 9, family: "'DM Mono'" } } }, x: { ticks: { maxTicksLimit: 8, font: { size: 8 } }, grid: { display: false } } }
      }
    }));
  }

  // --- 4. Import Sources (Pie) ---
  const sourceCounts = { 'X/Twitter': 0, 'Pocket': 0, 'Other': 0 };
  bms.forEach(b => { const tags = b.tags || []; const tagNames = tags.map(t => typeof t === 'string' ? t : (t.name || '')); if (tagNames.includes('x')) sourceCounts['X/Twitter']++; else if (tagNames.includes('raindrop') || tagNames.includes('pocket')) sourceCounts['Pocket']++; else sourceCounts['Other']++; });
  const srcLabels = Object.keys(sourceCounts).filter(k => sourceCounts[k] > 0);
  const srcData = srcLabels.map(k => sourceCounts[k]);

  const srcCtx = document.getElementById('chart-sources');
  if (srcCtx && srcLabels.length) {
    _reportsCharts.push(new Chart(srcCtx, {
      type: 'pie',
      data: { labels: srcLabels, datasets: [{ data: srcData, backgroundColor: ['#1d9bf0','#ee4056','#888'], borderColor: 'var(--surface)', borderWidth: 2, hoverOffset: 8 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 600, easing: 'easeOutQuart' },
        plugins: { legend: { position: 'right', labels: { font: { size: 10, family: "'DM Mono'" }, boxWidth: 12, padding: 8 } }, tooltip: { backgroundColor: 'var(--surface)', borderColor: 'var(--border)', borderWidth: 2, callbacks: { label: (ctx) => `${ctx.label}: ${ctx.parsed} (${((ctx.parsed / srcData.reduce((a,b) => a+b, 0)) * 100).toFixed(1)}%)` } } }
      }
    }));
  }

  // Render insights
  renderInsights(catTotals, topDomains, days.length, sourceCounts);
}

function updateMetrics() {
  const bms = state.bookmarks || [];
  const cats = state.categories || [];
  const totalEl = document.getElementById('metric-total');
  const catsEl = document.getElementById('metric-cats');
  const topEl = document.getElementById('metric-topcat');
  const domEl = document.getElementById('metric-domains');

  if (totalEl) totalEl.textContent = bms.length;

  const catCounts = {};
  cats.forEach(c => { catCounts[c.name] = 0; });
  catCounts['Uncategorized'] = 0;
  bms.forEach(b => { const c = cats.find(cat => cat.id === b.categoryId); const name = c ? c.name : 'Uncategorized'; catCounts[name] = (catCounts[name] || 0) + 1; });
  const activeCats = Object.keys(catCounts).filter(k => catCounts[k] > 0);

  if (catsEl) catsEl.textContent = activeCats.length;
  if (topEl) {
    const sorted = Object.entries(catCounts).filter(([_,v]) => v > 0).sort((a,b) => b[1] - a[1]);
    if (sorted.length) {
      topEl.textContent = sorted[0][0].length > 14 ? sorted[0][0].slice(0, 12) + '…' : sorted[0][0];
    }
  }

  const domains = new Set(bms.map(b => b.domain || 'unknown'));
  if (domEl) domEl.textContent = domains.size;
}

function updateChartFilterBar() {
  const bar = document.getElementById('chart-filter-bar');
  const val = document.getElementById('chart-filter-value');
  if (!bar || !val) return;
  if (state.chartFilter) {
    bar.classList.add('visible');
    const typeLabel = state.chartFilter.type === 'category' ? 'Category' : state.chartFilter.type === 'domain' ? 'Domain' : 'Date';
    val.textContent = `${typeLabel}: ${state.chartFilter.value}`;
  } else {
    bar.classList.remove('visible');
  }
}

function applyChartFilter(type, value) {
  state.chartFilter = { type, value };
  state.category = null;
  state.page = 1;
  state.loading = true;

  if (type === 'category') {
    const cat = state.categories.find(c => c.name === value);
    if (cat) { state.category = cat.id; state.filter = ''; }
  } else if (type === 'domain') {
    state.filter = `domain:${value}`;
  } else if (type === 'date') {
    state.filter = `date:${value}`;
  }

  const inp = document.getElementById('search-input');
  if (inp) inp.value = state.filter;
  renderBookmarks();
  loadData();
}

function clearChartFilter() {
  state.chartFilter = null;
  state.page = 1;
  state.loading = true;
  state.filter = '';
  state.category = null;
  const inp = document.getElementById('search-input');
  if (inp) inp.value = '';
  renderBookmarks();
  loadData();
}

function renderInsights(catTotals, topDomains, numDays, sourceCounts) {
  const container = document.getElementById('insights-content');
  if (!container) return;
  const bms = state.bookmarks || [];
  if (!bms.length) { container.innerHTML = '<span style="color:var(--text-tertiary)">No data to analyze</span>'; return; }

  const insights = [];

  // Top category
  if (catTotals.labels.length) {
    const top = catTotals.labels[0];
    const topCount = catTotals.data[0];
    const pct = ((topCount / bms.length) * 100).toFixed(1);
    insights.push({ label: `🏆 Top: ${top}`, value: `${topCount} (${pct}%)`, click: () => applyChartFilter('category', top) });
  }

  // Top domain
  if (topDomains.length) {
    const [dom, domCount] = topDomains[0];
    insights.push({ label: `🌐 ${dom.replace('www.', '')}`, value: `${domCount}`, click: () => applyChartFilter('domain', dom) });
  }

  // Time span
  if (numDays) {
    insights.push({ label: `📅 Span`, value: `${numDays} days` });
  }

  // Largest source
  const srcEntries = Object.entries(sourceCounts).filter(([_,v]) => v > 0).sort((a,b) => b[1] - a[1]);
  if (srcEntries.length) {
    const [src, srcCount] = srcEntries[0];
    insights.push({ label: `📥 Main source`, value: `${src} (${srcCount})` });
  }

  // Average per day
  if (numDays > 0) {
    const avg = (bms.length / numDays).toFixed(1);
    insights.push({ label: `📊 Avg/day`, value: avg });
  }

  container.innerHTML = insights.map(i =>
    `<span class="insight-item ${i.click ? 'clickable' : ''}" data-insight="${escapeHtml(i.label)}"><span class="insight-label">${i.label}</span> <span class="insight-value">${i.value}</span></span>`
  ).join('');

  // Bind clickable insights
  container.querySelectorAll('.insight-item.clickable').forEach(el => {
    el.addEventListener('click', () => {
      const label = el.dataset.insight;
      // Find the matching insight and fire its click
      insights.forEach(i => {
        if (i.click && i.label === label) i.click();
      });
    });
  });
}

// ---- Bindings ----
function fillCategorySelect() {
  const sel = document.getElementById('add-category');
  if (!sel) return;
  sel.innerHTML = '';
  (state.categories || []).forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

function bindApp() {
  // Search
  const searchInput = document.getElementById('search-input');
  let searchTimer;
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.filter = searchInput.value;
        state.page = 1;
        state.loading = true;
        renderBookmarks();
        loadData();
      }, 250);
    });
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); searchInput.focus(); }
      if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(e.target.tagName)) { e.preventDefault(); searchInput.focus(); }
    });
  }

  // View toggle
  document.querySelectorAll('#view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.view = btn.dataset.view;
      document.querySelectorAll('#view-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.mb-btn[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === state.view));
      renderBookmarks();
    });
  });

  // Mobile view toggle
  document.querySelectorAll('.mb-btn[data-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.view = btn.dataset.view;
      document.querySelectorAll('.mb-btn[data-view]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('#view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === state.view));
      renderBookmarks();
    });
  });

  // Theme
  const themeBtn = document.getElementById('theme-btn');
  if (themeBtn) {
    themeBtn.addEventListener('click', () => {
      state.theme = state.theme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', state.theme);
      localStorage.setItem('grimoire-theme', state.theme);
      themeBtn.textContent = state.theme === 'light' ? '🌙' : '☀️';
    });
  }

  // Add bookmark
  const addBtn = document.getElementById('add-btn');
  const addModal = document.getElementById('add-modal');
  const addForm = document.getElementById('add-form');
  const addUrl = document.getElementById('add-url');
  const addTitle = document.getElementById('add-title');
  const addError = document.getElementById('add-error');
  const addClose = document.getElementById('add-modal-close');
  if (addBtn && addModal) {
    addBtn.addEventListener('click', () => {
      fillCategorySelect();
      addUrl.value = '';
      addTitle.value = '';
      addError.style.display = 'none';
      addModal.style.display = 'flex';
      addUrl.focus();
    });
    addModal.addEventListener('click', (e) => { if (e.target === addModal) addModal.style.display = 'none'; });
    if (addClose) addClose.addEventListener('click', () => { addModal.style.display = 'none'; });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && addModal.style.display === 'flex') addModal.style.display = 'none'; });
  }
  if (addForm) {
    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      let url = addUrl.value.trim();
      if (!url) return;
      // Auto-prepend https:// for bare domains like "zombo.com"
      if (!/^https?:\/\//i.test(url) && !/^ftp:\/\//i.test(url) && url.includes('.') && !url.includes(' ')) {
        url = 'https://' + url;
      }
      let title = addTitle.value.trim() || url;
      const catSelect = document.getElementById('add-category');
      const category = catSelect ? parseInt(catSelect.value) : 1;
      const submitBtn = addForm.querySelector('button[type="submit"]');
      submitBtn.textContent = 'Adding...';
      submitBtn.disabled = true;
      try {
        const resp = await fetch(API.bookmarks, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, title, category }),
          credentials: 'include'
        });
        const data = await resp.json();
        if (resp.ok && (data.success || data.bookmark)) {
          addModal.style.display = 'none';
          state.loading = true;
          renderBookmarks();
          await loadData(true);
        } else {
          addError.textContent = 'Failed: ' + (data.error || 'unknown');
          addError.style.display = 'block';
        }
      } catch (err) {
        addError.textContent = 'Network error: ' + err.message;
        addError.style.display = 'block';
      } finally {
        submitBtn.textContent = 'Add Bookmark';
        submitBtn.disabled = false;
      }
    });
  }

  // Refresh
  const refreshBtn = document.getElementById('refresh-btn');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', () => {
      clearCache();
      state.loading = true;
      renderBookmarks();
      loadData(true);
      refreshBtn.style.opacity = '0.5';
      setTimeout(() => refreshBtn.style.opacity = '1', 300);
    });
  }

  // Reports collapse/expand
  const reportsHeader = document.getElementById('reports-header');
  if (reportsHeader) {
    reportsHeader.addEventListener('click', (e) => {
      // Don't collapse if clicking a chart or insight
      if (e.target.closest('.chart-card') || e.target.closest('.insight-item')) return;
      state.reportsOpen = !state.reportsOpen;
      const section = document.getElementById('reports-section');
      if (section) section.classList.toggle('collapsed');
      // Re-render charts when expanding (canvases get proper dimensions)
      if (state.reportsOpen) renderReports();
    });
  }

  // Chart filter clear
  const clearBtn = document.getElementById('chart-filter-clear');
  if (clearBtn) {
    clearBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      clearChartFilter();
    });
  }

  // Categories button
  const catBtn = document.getElementById('categories-btn');
  if (catBtn) catBtn.addEventListener('click', openCategoriesDrawer);
  const mbCats = document.getElementById('mb-categories');
  if (mbCats) mbCats.addEventListener('click', openCategoriesDrawer);

  // Categories drawer close
  const drawerOverlay = document.getElementById('cat-drawer-overlay');
  if (drawerOverlay) drawerOverlay.addEventListener('click', closeCategoriesDrawer);
  const drawerClose = document.getElementById('drawer-close');
  if (drawerClose) drawerClose.addEventListener('click', closeCategoriesDrawer);

  // Quick peek
  const peekOverlay = document.getElementById('peek-overlay');
  if (peekOverlay) peekOverlay.addEventListener('click', (e) => { if (e.target === peekOverlay) closeQuickPeek(); });
  const peekClose = document.getElementById('peek-close');
  if (peekClose) peekClose.addEventListener('click', closeQuickPeek);

  // Random
  const randomBtn = document.getElementById('random-btn');
  if (randomBtn) randomBtn.addEventListener('click', showRandomBookmark);
  const mbRandom = document.getElementById('mb-random');
  if (mbRandom) mbRandom.addEventListener('click', showRandomBookmark);
  const rhDismiss = document.getElementById('rh-dismiss');
  if (rhDismiss) rhDismiss.addEventListener('click', () => { document.getElementById('random-highlight').classList.remove('visible'); });

  // Save collection
  const saveColBtn = document.getElementById('save-collection-btn');
  if (saveColBtn) saveColBtn.addEventListener('click', saveCurrentAsCollection);
}

// ---- Utilities ----
function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

// ---- Init ----
async function init() {
  document.documentElement.setAttribute('data-theme', state.theme);
  try {
    const resp = await fetch(API.categories, { credentials: 'include' });
    state.authenticated = resp.ok;
  } catch { state.authenticated = false; }
  render();
  if (state.authenticated) await loadData();
}

init();
</script>
